<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>U-Tech Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@1.2.1"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-crosshair@1.2.0"></script>

<style>

.fixed-header {
    position:fixed;
    top:0;
    left:0;
    right:0;
    z-index:1000;

    background:#eef3f1;
    border-bottom:1px solid #ddd;

    padding:10px 20px;
}

.logo-header {
    display:flex;
    align-items:center;
    gap:12px;

    margin-bottom:10px;
    padding:0;

    background:none;
    border:none;
    border-radius:0;
    box-shadow:none;
}

.logo-mark {
    width:52px;
    height:52px;
    border-radius:14px;
    background:linear-gradient(135deg, #1f8f5f, #2aa7c8);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.logo-u {
    color:white;
    font-size:30px;
    font-weight:800;
    letter-spacing:-1px;
}

.logo-title {
    font-size:28px;
    font-weight:800;
    color:#1f3d33;
    letter-spacing:0.5px;
    line-height:1;
}

.logo-subtitle {
    margin-top:4px;
    font-size:13px;
    color:#4f6f66;
    letter-spacing:1px;
}

body {
    font-family: sans-serif;
    margin:20px;
    overflow-y:auto;
    padding-top:190px;
}

.box { margin:10px 0; }
button { margin:5px; }

.grid {
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    align-items:flex-start;
    justify-content:flex-start;
}

.grid > div {
    width:500px;
    border:2px solid #b8d8cf;
    background:#fbfdfc;
    padding:10px;
    box-sizing:border-box;
}

.grid h4 {
    margin:0 0 8px 0;
    padding:6px 8px;
    background:#eef3f1;
    border-left:5px solid #1f8f5f;
}

.chart-container {
    width:100%;
    min-width:320px;
    height:350px;
    margin-bottom:25px;
}

.status-container {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin:10px 0;
}

.status-box {
    border:1px solid #ccc;
    padding:10px;
    border-radius:8px;
    background:rgba(0,0,0,0.03);
}

@media (max-width: 600px) {
    .grid > div {
        width:100%;
    }

    .chart-container {
        min-width:0;
        width:100%;
    }
}
</style>
</head>

<body>

<div class="fixed-header">

<header class="logo-header">
    <div class="logo-mark">
        <span class="logo-u">U</span>
    </div>
    <div>
        <div class="logo-title">U-Tech</div>
        <div class="logo-subtitle">Greenhouse Monitor</div>
    </div>
</header>

<div class="box">
user_id：
<input type="text" id="userId" placeholder="例: T0001">
<button onclick="loadData()">表示</button>
<button onclick="resetZoom()">ズームリセット</button>
</div>

<div id="message" style="color:#666; margin:10px;"></div>

<div class="status-container">
<div class="status-box">現在温度（P01）：<span id="tempNow">-</span>℃</div>
<div class="status-box">現在湿度（P01）：<span id="humNow">-</span>%</div>
<div class="status-box">前日最高（P01）：<span id="yMax">-</span>℃</div>
<div class="status-box">前日最低（P01）：<span id="yMin">-</span>℃</div>
</div>

</div>

<h3>温度・湿度</h3>

<div class="grid">

    <div>
        <h4>ハウス内_P01</h4>
        <div class="chart-container"><canvas id="tempChartP01"></canvas></div>
    </div>

    <div>
        <h4>ハウス内_P02</h4>
        <div class="chart-container"><canvas id="tempChartP02"></canvas></div>
    </div>

    <div>
        <h4>屋外_P11</h4>
        <div class="chart-container"><canvas id="tempChartP11"></canvas></div>
    </div>

    <div>
        <h4>水蒸気量・飽差（P01）</h4>
        <div class="chart-container"><canvas id="vaporChart"></canvas></div>
    </div>

    <div>
        <h4>日射（P11）</h4>
        <div class="chart-container"><canvas id="solarChart"></canvas></div>
    </div>

    <div>
        <h4>CO2</h4>
        <div class="chart-container"><canvas id="co2Chart"></canvas></div>
    </div>

    <div>
        <h4>温度差・湿度差（P01−P02）</h4>
        <div class="chart-container"><canvas id="diffChart"></canvas></div>
    </div>

    <div>
        <h4>電圧（P11）</h4>
        <div class="chart-container"><canvas id="voltChart"></canvas></div>
    </div>

</div>

<script>

let tempChartP01, tempChartP02, tempChartP11;
let diffChart, solarChart, voltChart, vaporChart, co2Chart;

let allCharts = [];
let syncingZoom = false;

window.addEventListener("DOMContentLoaded", ()=>{
    const savedUserId = localStorage.getItem("usui_user_id");
    if(savedUserId){
        document.getElementById("userId").value = savedUserId;
    }
});

const midnightLinePlugin = {
    id:"midnightLinePlugin",
    afterDraw(chart){
        const xScale = chart.scales.x;
        const chartArea = chart.chartArea;

        if(!xScale || !chartArea) return;

        const min = xScale.min;
        const max = xScale.max;

        let d = new Date(min);
        d.setHours(0,0,0,0);

        const ctx = chart.ctx;
        ctx.save();
        ctx.strokeStyle = "rgba(0,0,0,0.28)";
        ctx.lineWidth = 1;

        while(d.getTime() <= max){
            const x = xScale.getPixelForValue(d.getTime());

            if(x >= chartArea.left && x <= chartArea.right){
                ctx.beginPath();
                ctx.moveTo(x, chartArea.top);
                ctx.lineTo(x, chartArea.bottom);
                ctx.stroke();
            }

            d = new Date(d.getTime() + 24*60*60*1000);
        }

        ctx.restore();
    }
};

const pointLabelPlugin = {
    id:"pointLabelPlugin",
    afterDatasetsDraw(chart){
        const active = chart.tooltip && chart.tooltip.getActiveElements
            ? chart.tooltip.getActiveElements()
            : [];

        if(!active.length) return;

        const ctx = chart.ctx;
        ctx.save();

        active.forEach(activePoint=>{
            const datasetIndex = activePoint.datasetIndex;
            const index = activePoint.index;
            const dataset = chart.data.datasets[datasetIndex];
            const meta = chart.getDatasetMeta(datasetIndex);
            const point = meta.data[index];

            if(!point || !dataset || !dataset.data[index]) return;

            const value = dataset.data[index].y;

            if(value === null || value === undefined || isNaN(value)) return;

            const text = dataset.label + "：" + Number(value).toFixed(2);

            const x = point.x + 8;
            const y = point.y - 8;

            ctx.font = "12px sans-serif";
            const width = ctx.measureText(text).width + 10;

            ctx.fillStyle = "rgba(255,255,255,0.9)";
            ctx.fillRect(x, y - 16, width, 20);

            ctx.strokeStyle = "rgba(0,0,0,0.25)";
            ctx.strokeRect(x, y - 16, width, 20);

            ctx.fillStyle = "#222";
            ctx.fillText(text, x + 5, y - 2);
        });

        ctx.restore();
    }
};

Chart.register(midnightLinePlugin, pointLabelPlugin);

function formatTime(value){
    const d = new Date(value);
    const h = String(d.getHours()).padStart(2,"0");
    const m = String(d.getMinutes()).padStart(2,"0");
    return h + "時" + m + "分";
}

function formatTimeTick(value){
    const d = new Date(value);
    const h = String(d.getHours()).padStart(2,"0");
    const m = String(d.getMinutes()).padStart(2,"0");
    return [h + "時", m + "分"];
}

function calcVapor(temp, hum){
    const es = 6.1078 * Math.pow(10, (7.5 * temp) / (237.3 + temp));
    const ea = es * hum / 100;
    return 216.7 * (ea / (temp + 273.15));
}

function baseOptions(minTime,maxTime){
    return {
        parsing:false,
        responsive:true,
        maintainAspectRatio:false,
        interaction:{mode:"index",intersect:false},
        plugins:{
            zoom:{
                zoom:{
                    wheel:{enabled:true},
                    pinch:{enabled:true},
                    drag:{enabled:true},
                    mode:"x",
                    onZoomComplete({chart}){ syncZoom(chart); }
                },
                pan:{
                    enabled:true,
                    mode:"x",
                    onPanComplete({chart}){ syncZoom(chart); }
                }
            },
            crosshair:{
                line:{color:"#000",width:1},
                sync:{
                    enabled:true,
                    group:1,
                    suppressTooltips:false
                },
                zoom:{enabled:false},
                snap:{enabled:false}
            },
            tooltip:{
                callbacks:{
                    title(items){
                        if(!items.length) return "";
                        return formatTime(items[0].parsed.x);
                    }
                }
            }
        },
        scales:{
            x:{
                type:"linear",
                min:minTime.getTime(),
                max:maxTime.getTime(),
                grid:{
                    drawOnChartArea:false
                },
                ticks:{
                    callback:function(value){
                        return formatTimeTick(value);
                    },
                    maxRotation:0,
                    autoSkip:true
                }
            }
        }
    };
}

function syncZoom(sourceChart){

    if(syncingZoom) return;
    syncingZoom = true;

    const xScale = sourceChart.scales.x;

    allCharts.forEach(chart=>{
        if(chart && chart !== sourceChart){
            chart.options.scales.x.min = xScale.min;
            chart.options.scales.x.max = xScale.max;
            chart.update("none");
        }
    });

    syncingZoom = false;
}

async function fetchDataSafe(userId, pointId){

    const controller = new AbortController();
    const timeoutId = setTimeout(()=>controller.abort(), 10000);

    try{
        const url = `get_data.php?user_id=${encodeURIComponent(userId)}&point_id=${encodeURIComponent(pointId)}`;

        const res = await fetch(url, {
            signal:controller.signal,
            cache:"no-store"
        });

        clearTimeout(timeoutId);

        if(!res.ok){
            return { pointId, data:[], error:`${pointId}：HTTPエラー ${res.status}` };
        }

        const text = await res.text();

        if(!text.trim()){
            return { pointId, data:[], error:`${pointId}：空のレスポンス` };
        }

        let data;

        try{
            data = JSON.parse(text);
        }catch(e){
            return { pointId, data:[], error:`${pointId}：JSON形式ではありません` };
        }

        if(!Array.isArray(data)){
            return { pointId, data:[], error:`${pointId}：配列データではありません` };
        }

        return { pointId, data, error:null };

    }catch(e){

        clearTimeout(timeoutId);

        if(e.name === "AbortError"){
            return { pointId, data:[], error:`${pointId}：通信タイムアウト` };
        }

        return { pointId, data:[], error:`${pointId}：通信エラー` };
    }
}

function parseData(data, minTime){

    return data.map(d=>{
        const date = new Date(d.recorded_at);

        return {
            x:date,
            xValue:date.getTime(),
            temp:d.temperature !== null && d.temperature !== undefined ? Number(d.temperature) : null,
            hum:d.humidity !== null && d.humidity !== undefined ? Number(d.humidity) : null,
            co2:d.CO2 !== null && d.CO2 !== undefined ? Number(d.CO2) : null,
            solar:d.solar_radiation !== null && d.solar_radiation !== undefined ? Number(d.solar_radiation) : null,
            volt:d.voltage !== null && d.voltage !== undefined ? Number(d.voltage) : null
        };
    }).filter(d=>
        !isNaN(d.xValue) &&
        d.x >= minTime
    );
}

function createTempHumChart(canvasId, parsed, minTime, maxTime){

    return new Chart(document.getElementById(canvasId),{
        type:"line",
        data:{
            datasets:[
                {
                    label:"湿度 (%)",
                    data:parsed
                        .filter(d=>d.hum !== null && !isNaN(d.hum))
                        .map(d=>({x:d.xValue,y:d.hum})),
                    yAxisID:"yHum",
                    borderColor:"rgb(54, 162, 235)",
                    backgroundColor:"rgba(54, 162, 235, 0.15)",
                    pointBackgroundColor:"rgb(54, 162, 235)",
                    pointRadius:2,
                    borderWidth:2,
                    tension:0.2
                },
                {
                    label:"温度 (℃)",
                    data:parsed
                        .filter(d=>d.temp !== null && !isNaN(d.temp))
                        .map(d=>({x:d.xValue,y:d.temp})),
                    yAxisID:"yTemp",
                    borderColor:"rgb(255, 99, 132)",
                    backgroundColor:"rgba(255, 99, 132, 0.15)",
                    pointBackgroundColor:"rgb(255, 99, 132)",
                    pointRadius:2,
                    borderWidth:2,
                    tension:0.2
                }
            ]
        },
        options:{
            ...baseOptions(minTime,maxTime),
            scales:{
                ...baseOptions(minTime,maxTime).scales,
                yHum:{
                    position:"left",
                    min:50,
                    max:100,
                    ticks:{stepSize:10}
                },
                yTemp:{
                    position:"right",
                    min:10,
                    max:60,
                    ticks:{stepSize:10}
                }
            }
        }
    });
}

function createVaporChart(canvasId, parsed, minTime, maxTime){

    return new Chart(document.getElementById(canvasId),{
        type:"line",
        data:{
            datasets:[
                {
                    label:"水蒸気量 (g/㎥)",
                    data:parsed
                        .filter(d=>d.temp !== null && d.hum !== null && !isNaN(d.temp) && !isNaN(d.hum))
                        .map(d=>({x:d.xValue,y:calcVapor(d.temp,d.hum)})),
                    borderColor:"rgb(75, 192, 192)",
                    backgroundColor:"rgba(75, 192, 192, 0.15)",
                    pointBackgroundColor:"rgb(75, 192, 192)",
                    pointRadius:2,
                    borderWidth:2,
                    tension:0.2
                },
                {
                    label:"飽差 (g/㎥)",
                    data:parsed
                        .filter(d=>d.temp !== null && d.hum !== null && !isNaN(d.temp) && !isNaN(d.hum))
                        .map(d=>({x:d.xValue,y:calcVapor(d.temp,100)-calcVapor(d.temp,d.hum)})),
                    borderColor:"rgb(255, 159, 64)",
                    backgroundColor:"rgba(255, 159, 64, 0.15)",
                    pointBackgroundColor:"rgb(255, 159, 64)",
                    pointRadius:2,
                    borderWidth:2,
                    tension:0.2
                }
            ]
        },
        options:{
            ...baseOptions(minTime,maxTime),
            scales:{
                ...baseOptions(minTime,maxTime).scales,
                y:{
                    title:{display:true,text:"g/㎥"}
                }
            }
        }
    });
}

function createDiffChart(canvasId, p01, p02, minTime, maxTime){

    const p02Map = new Map(
        p02.map(d=>[
            Math.floor(d.xValue/60000),
            { temp:d.temp, hum:d.hum }
        ])
    );

    const tempDiffData = [];
    const humDiffData = [];

    p01.forEach(d=>{
        const key = Math.floor(d.xValue/60000);
        const p02Data = p02Map.get(key);

        if(!p02Data) return;

        if(d.temp !== null && p02Data.temp !== null && !isNaN(d.temp) && !isNaN(p02Data.temp)){
            tempDiffData.push({ x:d.xValue, y:d.temp - p02Data.temp });
        }

        if(d.hum !== null && p02Data.hum !== null && !isNaN(d.hum) && !isNaN(p02Data.hum)){
            humDiffData.push({ x:d.xValue, y:d.hum - p02Data.hum });
        }
    });

    return new Chart(document.getElementById(canvasId),{
        type:"line",
        data:{
            datasets:[
                {
                    label:"温度差 P01−P02 (℃)",
                    data:tempDiffData,
                    borderColor:"rgb(255, 159, 64)",
                    backgroundColor:"rgba(255, 159, 64, 0.15)",
                    pointBackgroundColor:"rgb(255, 159, 64)",
                    pointRadius:2,
                    borderWidth:2,
                    tension:0.2
                },
                {
                    label:"湿度差 P01−P02 (%)",
                    data:humDiffData,
                    borderColor:"rgb(75, 192, 192)",
                    backgroundColor:"rgba(75, 192, 192, 0.15)",
                    pointBackgroundColor:"rgb(75, 192, 192)",
                    pointRadius:2,
                    borderWidth:2,
                    tension:0.2
                }
            ]
        },
        options:{
            ...baseOptions(minTime,maxTime),
            scales:{
                ...baseOptions(minTime,maxTime).scales,
                y:{
                    min:-5,
                    max:5,
                    ticks:{stepSize:1},
                    title:{display:true,text:"差"}
                }
            }
        }
    });
}

function createSingleChart(canvasId, parsed, key, label, unit, minTime, maxTime){

    let color = "rgb(153, 102, 255)";
    let bg = "rgba(153, 102, 255, 0.15)";

    if(key === "solar"){
        color = "rgb(255, 205, 86)";
        bg = "rgba(255, 205, 86, 0.2)";
    }

    if(key === "co2"){
        color = "rgb(100, 100, 100)";
        bg = "rgba(100, 100, 100, 0.15)";
    }

    if(key === "volt"){
        color = "rgb(201, 203, 207)";
        bg = "rgba(201, 203, 207, 0.2)";
    }

    return new Chart(document.getElementById(canvasId),{
        type:"line",
        data:{
            datasets:[{
                label:label,
                data:parsed
                    .filter(d=>d[key] !== null && !isNaN(d[key]))
                    .map(d=>({x:d.xValue,y:d[key]})),
                borderColor:color,
                backgroundColor:bg,
                pointBackgroundColor:color,
                pointRadius:2,
                borderWidth:2,
                tension:0.2
            }]
        },
        options:{
            ...baseOptions(minTime,maxTime),
            scales:{
                ...baseOptions(minTime,maxTime).scales,
                y:{
                    title:{display:true,text:unit}
                }
            }
        }
    });
}

async function loadData(){

    const userId = document.getElementById("userId").value.trim();
    const msg = document.getElementById("message");

    if(!userId){
        msg.innerText = "user_id を入力してください";
        return;
    }

    localStorage.setItem("usui_user_id", userId);

    msg.innerText = "読み込み中...";

    document.getElementById("tempNow").innerText = "-";
    document.getElementById("humNow").innerText = "-";
    document.getElementById("yMax").innerText = "-";
    document.getElementById("yMin").innerText = "-";

    destroyCharts();

    try{

        const now = new Date();
        const minTime = new Date(now.getTime() - 72*60*60*1000);

        const results = await Promise.all([
            fetchDataSafe(userId,"P01"),
            fetchDataSafe(userId,"P02"),
            fetchDataSafe(userId,"P11")
        ]);

        const resultP01 = results.find(r=>r.pointId === "P01");
        const resultP02 = results.find(r=>r.pointId === "P02");
        const resultP11 = results.find(r=>r.pointId === "P11");

        const p01 = parseData(resultP01.data, minTime);
        const p02 = parseData(resultP02.data, minTime);
        const p11 = parseData(resultP11.data, minTime);

        const errors = results
            .filter(r=>r.error)
            .map(r=>r.error);

        if(!p01.length && !p02.length && !p11.length){
            msg.innerText = "No data（72時間内データなし）" + (errors.length ? " / " + errors.join(" / ") : "");
            return;
        }

        if(p01.length){
            const validP01 = p01.filter(d=>
                d.temp !== null &&
                d.hum !== null &&
                !isNaN(d.temp) &&
                !isNaN(d.hum)
            );

            if(validP01.length){
                const last = validP01[validP01.length - 1];

                document.getElementById("tempNow").innerText = last.temp.toFixed(1);
                document.getElementById("humNow").innerText = last.hum.toFixed(1);

                const yStart = new Date();
                yStart.setDate(yStart.getDate() - 1);
                yStart.setHours(0,0,0,0);

                const yEnd = new Date(yStart);
                yEnd.setHours(23,59,59,999);

                const yData = validP01.filter(d=>d.x>=yStart && d.x<=yEnd);

                if(yData.length){
                    const temps = yData.map(d=>d.temp);
                    document.getElementById("yMax").innerText = Math.max(...temps).toFixed(1);
                    document.getElementById("yMin").innerText = Math.min(...temps).toFixed(1);
                }
            }
        }

        tempChartP01 = createTempHumChart("tempChartP01", p01, minTime, now);
        tempChartP02 = createTempHumChart("tempChartP02", p02, minTime, now);
        tempChartP11 = createTempHumChart("tempChartP11", p11, minTime, now);

        vaporChart = createVaporChart("vaporChart", p01, minTime, now);

        solarChart = createSingleChart("solarChart", p11, "solar", "日射", "日射", minTime, now);
        co2Chart = createSingleChart("co2Chart", p11, "co2", "CO2", "ppm", minTime, now);

        diffChart = createDiffChart("diffChart", p01, p02, minTime, now);

        voltChart = createSingleChart("voltChart", p11, "volt", "電圧", "V", minTime, now);

        allCharts = [
            tempChartP01,
            tempChartP02,
            tempChartP11,
            vaporChart,
            solarChart,
            co2Chart,
            diffChart,
            voltChart
        ];

        msg.innerText = errors.length ? errors.join(" / ") : "";

    }catch(e){
        msg.innerText = "画面側エラー：" + e.message;
        console.error(e);
    }
}

function destroyCharts(){
    allCharts.forEach(c=>{
        if(c) c.destroy();
    });
    allCharts = [];
}

function resetZoom(){
    allCharts.forEach(c=>{
        if(c) c.resetZoom();
    });
}

</script>

</body>
</html>
