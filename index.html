<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>USUI Tech</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-crosshair"></script>

<style>
body { font-family: sans-serif; margin:20px; }

.box { margin:10px 0; }

.grid {
    display:grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap:20px;
    align-items:start;
}

.chart-container {
    width:100%;
    height:350px;
    margin:10px auto 25px;
}

.status-container { display:flex; gap:10px; flex-wrap:wrap; }
.status-box { border:1px solid #ccc; padding:10px; border-radius:8px; background:rgba(0,0,0,0.03); }

button { margin:5px; }

.full {
    grid-column: 1 / 4;
}

@media (max-width: 1100px) {
    .grid {
        grid-template-columns: 1fr;
    }
    .full {
        grid-column: auto;
    }
}
</style>
</head>

<body>

<div class="box">
user_id：
<input type="text" id="userId" placeholder="例: T0001">
<button onclick="loadData()">表示</button>
<button onclick="resetZoom()">ズームリセット</button>
</div>

<div id="message" style="text-align:center; color:#666; margin:10px;"></div>

<div class="status-container">
<div class="status-box">P01 現在温度：<span id="tempNowP01">-</span>℃</div>
<div class="status-box">P01 現在湿度：<span id="humNowP01">-</span>%</div>
<div class="status-box">P02 現在温度：<span id="tempNowP02">-</span>℃</div>
<div class="status-box">P02 現在湿度：<span id="humNowP02">-</span>%</div>
<div class="status-box">P11 現在温度：<span id="tempNowP11">-</span>℃</div>
<div class="status-box">P11 現在湿度：<span id="humNowP11">-</span>%</div>
</div>

<div class="grid">

    <div>
        <h3>温度・湿度 P01</h3>
        <div class="chart-container"><canvas id="tempChartP01"></canvas></div>

        <h3>温度・湿度 P11</h3>
        <div class="chart-container"><canvas id="tempChartP11"></canvas></div>
    </div>

    <div>
        <h3>温度・湿度 P02</h3>
        <div class="chart-container"><canvas id="tempChartP02"></canvas></div>
    </div>

    <div>
        <h3>温度差（P01−P02）</h3>
        <div class="chart-container"><canvas id="tempDiffChart"></canvas></div>
    </div>

    <div class="full">
        <h3>日射</h3>
        <div class="chart-container"><canvas id="solarChart"></canvas></div>
    </div>

    <div class="full">
        <h3>電圧</h3>
        <div class="chart-container"><canvas id="voltChart"></canvas></div>
    </div>

</div>

<script>

let charts = [];
let tempChartP01, tempChartP02, tempChartP11, tempDiffChart, solarChart, voltChart;
let syncingZoom = false;

function calcVapor(temp, hum){
    const es = 6.1078 * Math.pow(10, (7.5*temp)/(237.3+temp));
    const ea = es * hum/100;
    return 216.7*(ea/(temp+273.15));
}

function baseOptions(minTime,maxTime){
    return {
        parsing:false,
        responsive:true,
        maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
            tooltip:{
                mode:'index',
                intersect:false
            },
            zoom:{
                zoom:{
                    wheel:{enabled:true},
                    pinch:{enabled:true},
                    drag:{enabled:true},
                    mode:'x',
                    onZoomComplete({chart}){
                        syncZoom(chart);
                    }
                },
                pan:{
                    enabled:true,
                    mode:'x',
                    onPanComplete({chart}){
                        syncZoom(chart);
                    }
                }
            },
            crosshair:{
                line:{color:'#000',width:1},
                sync:{
                    enabled:true,
                    group:1,
                    suppressTooltips:false
                },
                zoom:{enabled:false}
            }
        },
        scales:{
            x:{
                type:"time",
                min:minTime,
                max:maxTime,
                time:{
                    displayFormats:{
                        minute:"HH:mm",
                        hour:"HH:mm",
                        day:"HH:mm"
                    },
                    tooltipFormat:"MM/dd HH:mm"
                },
                ticks:{
                    maxRotation:0,
                    autoSkip:true
                }
            }
        }
    };
}

function syncZoom(sourceChart){
    if(syncingZoom) return;

    syncingZoom = true;

    const min = sourceChart.scales.x.min;
    const max = sourceChart.scales.x.max;

    charts.forEach(chart=>{
        if(chart && chart !== sourceChart){
            chart.options.scales.x.min = min;
            chart.options.scales.x.max = max;
            chart.update("none");
        }
    });

    syncingZoom = false;
}

function resetZoom(){
    charts.forEach(chart=>{
        if(chart) chart.resetZoom();
    });
}

async function fetchData(userId, pointId){
    const res = await fetch(`get_data.php?user_id=${encodeURIComponent(userId)}&point_id=${encodeURIComponent(pointId)}`);
    return await res.json();
}

function parseData(data, minTime){
    return data.map(d=>({
        x:new Date(d.recorded_at),
        temp:Number(d.temperature),
        hum:Number(d.humidity),
        solar:d.solar_radiation !== null && d.solar_radiation !== undefined ? Number(d.solar_radiation) : null,
        volt:d.voltage !== null && d.voltage !== undefined ? Number(d.voltage) : null
    })).filter(d=>d.x>=minTime);
}

function setNow(pointId, parsed){
    const tempEl = document.getElementById(`tempNow${pointId}`);
    const humEl = document.getElementById(`humNow${pointId}`);

    if(!parsed.length){
        tempEl.innerText = "-";
        humEl.innerText = "-";
        return;
    }

    const last = parsed[parsed.length-1];
    tempEl.innerText = last.temp.toFixed(1);
    humEl.innerText = last.hum.toFixed(1);
}

function createTempHumChart(canvasId, parsed, pointId, minTime, maxTime){
    return new Chart(document.getElementById(canvasId),{
        type:"line",
        data:{
            datasets:[
                {
                    label:`${pointId} 湿度 (%)`,
                    data:parsed.map(d=>({x:d.x,y:d.hum})),
                    yAxisID:"yHum",
                    pointRadius:2
                },
                {
                    label:`${pointId} 温度 (℃)`,
                    data:parsed.map(d=>({x:d.x,y:d.temp})),
                    yAxisID:"yTemp",
                    pointRadius:2
                }
            ]
        },
        options:{
            ...baseOptions(minTime,maxTime),
            scales:{
                ...baseOptions(minTime,maxTime).scales,
                yHum:{position:"left",min:50,max:100},
                yTemp:{position:"right",min:10,max:60}
            }
        }
    });
}

function makeTempDiffData(p01, p02){
    return p01.map(a=>{
        let nearest = null;
        let nearestDiff = Infinity;

        p02.forEach(b=>{
            const diff = Math.abs(a.x - b.x);
            if(diff < nearestDiff){
                nearestDiff = diff;
                nearest = b;
            }
        });

        if(nearest && nearestDiff <= 5*60*1000){
            return {
                x:a.x,
                y:a.temp - nearest.temp
            };
        }

        return null;
    }).filter(d=>d !== null);
}

function createTempDiffChart(canvasId, diffData, minTime, maxTime){
    return new Chart(document.getElementById(canvasId),{
        type:"line",
        data:{
            datasets:[
                {
                    label:"温度差 P01−P02 (℃)",
                    data:diffData,
                    pointRadius:2
                }
            ]
        },
        options:{
            ...baseOptions(minTime,maxTime),
            scales:{
                ...baseOptions(minTime,maxTime).scales,
                y:{title:{display:true,text:"℃"}}
            }
        }
    });
}

function createSolarChart(canvasId, p01, p02, p11, minTime, maxTime){
    return new Chart(document.getElementById(canvasId),{
        type:"line",
        data:{
            datasets:[
                {
                    label:"P01 日射",
                    data:p01.map(d=>({x:d.x,y:d.solar})),
                    pointRadius:2
                },
                {
                    label:"P02 日射",
                    data:p02.map(d=>({x:d.x,y:d.solar})),
                    pointRadius:2
                },
                {
                    label:"P11 日射",
                    data:p11.map(d=>({x:d.x,y:d.solar})),
                    pointRadius:2
                }
            ]
        },
        options:{
            ...baseOptions(minTime,maxTime),
            scales:{
                ...baseOptions(minTime,maxTime).scales,
                y:{title:{display:true,text:"日射"}}
            }
        }
    });
}

function createVoltChart(canvasId, p01, p02, p11, minTime, maxTime){
    return new Chart(document.getElementById(canvasId),{
        type:"line",
        data:{
            datasets:[
                {
                    label:"P01 電圧",
                    data:p01.map(d=>({x:d.x,y:d.volt})),
                    pointRadius:2
                },
                {
                    label:"P02 電圧",
                    data:p02.map(d=>({x:d.x,y:d.volt})),
                    pointRadius:2
                },
                {
                    label:"P11 電圧",
                    data:p11.map(d=>({x:d.x,y:d.volt})),
                    pointRadius:2
                }
            ]
        },
        options:{
            ...baseOptions(minTime,maxTime),
            scales:{
                ...baseOptions(minTime,maxTime).scales,
                y:{title:{display:true,text:"V"}}
            }
        }
    });
}

async function loadData(){

    const userId = document.getElementById("userId").value;
    const msg = document.getElementById("message");

    if(!userId){
        msg.innerText = "user_id を入力してください";
        return;
    }

    msg.innerText = "読み込み中...";

    try{
        const now = new Date();
        const minTime = new Date(now.getTime() - 72*60*60*1000);

        const [dataP01, dataP02, dataP11] = await Promise.all([
            fetchData(userId,"P01"),
            fetchData(userId,"P02"),
            fetchData(userId,"P11")
        ]);

        const p01 = parseData(dataP01, minTime);
        const p02 = parseData(dataP02, minTime);
        const p11 = parseData(dataP11, minTime);

        charts.forEach(c=>{
            if(c) c.destroy();
        });
        charts = [];

        setNow("P01", p01);
        setNow("P02", p02);
        setNow("P11", p11);

        if(!p01.length && !p02.length && !p11.length){
            msg.innerText = "No data（72時間内データなし）";
            return;
        }

        tempChartP01 = createTempHumChart("tempChartP01", p01, "P01", minTime, now);
        tempChartP02 = createTempHumChart("tempChartP02", p02, "P02", minTime, now);
        tempChartP11 = createTempHumChart("tempChartP11", p11, "P11", minTime, now);

        const diffData = makeTempDiffData(p01, p02);
        tempDiffChart = createTempDiffChart("tempDiffChart", diffData, minTime, now);

        solarChart = createSolarChart("solarChart", p01, p02, p11, minTime, now);
        voltChart = createVoltChart("voltChart", p01, p02, p11, minTime, now);

        charts = [
            tempChartP01,
            tempChartP02,
            tempChartP11,
            tempDiffChart,
            solarChart,
            voltChart
        ];

        msg.innerText = "";

    }catch(e){
        msg.innerText = "通信エラー（get_data.php またはDBを確認してください）";
    }
}

</script>

</body>
</html>
