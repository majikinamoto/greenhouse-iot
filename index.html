<script>

let tempChartP01, tempChartP02, tempChartP11;
let diffChart, outsideDiffChart, solarChart, voltChart, vaporChart, co2Chart;

let allCharts = [];
let syncingZoom = false;

let tempMin = 10;
let tempMax = 60;

let humMin = 50;
let humMax = 100;

window.addEventListener("DOMContentLoaded", ()=>{
    const savedUserId = localStorage.getItem("usui_user_id");
    if(savedUserId){
        document.getElementById("userId").value = savedUserId;
        saveUserIdHistory(savedUserId);
    }

    updateUserIdHistoryList();
});

function getUserIdHistory(){
    try{
        return JSON.parse(localStorage.getItem("usui_user_id_history")) || [];
    }catch(e){
        return [];
    }
}

function saveUserIdHistory(userId){
    const history = getUserIdHistory()
        .filter(id=>id && id !== userId);

    history.unshift(userId);
    localStorage.setItem("usui_user_id_history", JSON.stringify(history.slice(0,10)));
    updateUserIdHistoryList();
}

function updateUserIdHistoryList(){
    const list = document.getElementById("userIdHistory");
    const select = document.getElementById("userIdHistorySelect");

    if(list){
        list.innerHTML = "";
    }

    if(select){
        select.innerHTML = '<option value="">履歴</option>';
    }

    getUserIdHistory().forEach(userId=>{
        if(list){
            const option = document.createElement("option");
            option.value = userId;
            list.appendChild(option);
        }

        if(select){
            const option = document.createElement("option");
            option.value = userId;
            option.textContent = userId;
            select.appendChild(option);
        }
    });
}

const chartBackgroundPlugin = {
    id: 'chartBackgroundPlugin',
    beforeDraw(chart) {

        const ctx = chart.ctx;
        const chartArea = chart.chartArea;

        if (!chartArea) return;

        ctx.save();

        ctx.fillStyle = "#ffffff";

        ctx.fillRect(
            chartArea.left,
            chartArea.top,
            chartArea.right - chartArea.left,
            chartArea.bottom - chartArea.top
        );

        ctx.restore();
    }
};

const midnightLinePlugin = {
    id:"midnightLinePlugin",
    afterDraw(chart){
        const xScale = chart.scales.x;
        const chartArea = chart.chartArea;

        if(!xScale || !chartArea) return;

        const min = xScale.min;
        const max = xScale.max;

        let d = new Date(min);
        d.setHours(0,0,0,0);

        const ctx = chart.ctx;
        ctx.save();
        ctx.strokeStyle = "rgba(0,0,0,0.28)";
        ctx.lineWidth = 1;

        while(d.getTime() <= max){
            const x = xScale.getPixelForValue(d.getTime());

            if(x >= chartArea.left && x <= chartArea.right){
                ctx.beginPath();
                ctx.moveTo(x, chartArea.top);
                ctx.lineTo(x, chartArea.bottom);
                ctx.stroke();
            }

            d = new Date(d.getTime() + 24*60*60*1000);
        }

        ctx.restore();
    }
};

const pointLabelPlugin = {
    id:"pointLabelPlugin",
    afterDatasetsDraw(chart){
        const active = chart.tooltip && chart.tooltip.getActiveElements
            ? chart.tooltip.getActiveElements()
            : [];

        if(!active.length) return;

        const ctx = chart.ctx;
        ctx.save();

        active.forEach(activePoint=>{
            const datasetIndex = activePoint.datasetIndex;
            const index = activePoint.index;
            const dataset = chart.data.datasets[datasetIndex];
            const meta = chart.getDatasetMeta(datasetIndex);
            const point = meta.data[index];

            if(!point || !dataset || !dataset.data[index]) return;

            const value = dataset.data[index].y;

            if(value === null || value === undefined || isNaN(value)) return;

            const labelMatch = dataset.label.match(/^(.+?)\s*\((.+)\)$/);
            const labelName = labelMatch ? labelMatch[1] : dataset.label;
            const unit = labelMatch ? " " + labelMatch[2] : "";
            const text = formatTime(dataset.data[index].x) + " " + labelName + " " + Number(value).toFixed(1) + unit;

ctx.font = "12px sans-serif";

const width = ctx.measureText(text).width + 10;
const height = 20;

let x = point.x + 8;
let y = point.y - 8;

const chartArea = chart.chartArea;

/* 右にはみ出す場合は、左側に表示 */
if(x + width > chartArea.right){
    x = point.x - width - 8;
}

/* 左にはみ出す場合は、左端に寄せる */
if(x < chartArea.left){
    x = chartArea.left + 2;
}

/* 上にはみ出す場合は、少し下に表示 */
if(y - height < chartArea.top){
    y = point.y + height;
}

/* 下にはみ出す場合は、少し上に表示 */
if(y > chartArea.bottom){
    y = chartArea.bottom - 2;
}

ctx.fillStyle = "rgba(255,255,255,0.85)";
ctx.fillRect(x, y - height, width, height);

ctx.fillStyle = "#000";
ctx.fillText(text, x + 5, y - 5);
        });

        ctx.restore();
    }
};

const vpdTargetZonePlugin = {
    id:"vpdTargetZonePlugin",
    beforeDatasetsDraw(chart){
        if(chart.canvas.id !== "vaporChart") return;

        const yScale = chart.scales.y;
        const chartArea = chart.chartArea;

        if(!yScale || !chartArea) return;

        const yTop = yScale.getPixelForValue(10);
        const yBottom = yScale.getPixelForValue(5);

        const ctx = chart.ctx;
        ctx.save();

        ctx.fillStyle = "rgba(120, 200, 120, 0.18)";
        ctx.fillRect(
            chartArea.left,
            yTop,
            chartArea.right - chartArea.left,
            yBottom - yTop
        );

        ctx.restore();
    }
};

Chart.register(
    chartBackgroundPlugin,
    midnightLinePlugin,
    vpdTargetZonePlugin,
    pointLabelPlugin
);

Chart.Tooltip.positioners.crosshairBottom = function(elements, eventPosition){
    const chartArea = this.chart.chartArea;

    return {
        x:eventPosition.x,
        y:chartArea.bottom,
        xAlign:"center",
        yAlign:"bottom"
    };
};

function formatTime(value){
    const d = new Date(value);
    const mo = String(d.getMonth() + 1).padStart(2,"0");
    const da = String(d.getDate()).padStart(2,"0");
    const h = String(d.getHours()).padStart(2,"0");
    const m = String(d.getMinutes()).padStart(2,"0");
    return mo + "月" + da + "日 " + h + "時" + m + "分";
}

function formatTimeTick(value){
    const d = new Date(value);
    const h = String(d.getHours()).padStart(2,"0");
    const m = String(d.getMinutes()).padStart(2,"0");
    return [h + "時", m + "分"];
}

function calcVapor(temp, hum){
    const es = 6.1078 * Math.pow(10, (7.5 * temp) / (237.3 + temp));
    const ea = es * hum / 100;
    return 216.7 * (ea / (temp + 273.15));
}

function calcDewPoint(temp, hum){
    const a = 17.27;
    const b = 237.7;
    const alpha = ((a * temp) / (b + temp)) + Math.log(hum / 100);
    return (b * alpha) / (a - alpha);
}

function baseOptions(minTime,maxTime){
    const zoomEnabled = !window.matchMedia("(max-width: 600px)").matches;

    return {
        parsing:false,
        responsive:true,
        maintainAspectRatio:false,
interaction:{
    mode:"index",
    intersect:false
},
        plugins:{
            zoom:{
                zoom:{
                    wheel:{enabled:false},
                    pinch:{enabled:zoomEnabled},
                    drag:{
    enabled:zoomEnabled,
    backgroundColor:"rgba(30,120,255,0.35)",
    borderColor:"rgba(30,120,255,0.8)",
    borderWidth:1
},

                    mode:"xy",
                    onZoomComplete({chart}){ syncZoom(chart); }
                },
pan:{
    enabled:false
}
            },
            crosshair:{
                line:{color:"#000",width:1},
                sync:{
                    enabled:true,
                    group:1,
                    suppressTooltips:false
                },
                zoom:{enabled:false},
                snap:{enabled:false}
            },
            tooltip:{
    position:"crosshairBottom",
    backgroundColor:"rgba(0,0,0,0)",
    titleColor:"#000",
    caretSize:0,
    padding:0,
    titleMarginBottom:0,
    mode:"index",
    intersect:false,
    callbacks:{
        title(items){
            if(!items.length) return "";
            return formatTime(items[0].parsed.x);
        },
        label(){
            return null;
        }
    }
}
        },
        scales:{
    x:{
        type:"linear",
        min:minTime.getTime(),
        max:maxTime.getTime(),

        grid:{
            drawOnChartArea:false
        },

        afterBuildTicks:function(scale){
            const min = scale.min;
            const max = scale.max;
            const range = max - min;

            const interval =
                range > 36 * 60 * 60 * 1000
                ? 60 * 60 * 1000
                : 30 * 60 * 1000;

            const startDate = new Date(min);
            startDate.setSeconds(0,0);

            if(interval === 60 * 60 * 1000){
                startDate.setMinutes(0,0,0);
                if(startDate.getTime() < min){
                    startDate.setHours(startDate.getHours() + 1);
                }
            }else{
                const m = startDate.getMinutes();

                if(m < 30){
                    startDate.setMinutes(30,0,0);
                }else{
                    startDate.setHours(startDate.getHours() + 1);
                    startDate.setMinutes(0,0,0);
                }
            }

            const ticks = [];

            for(let t = startDate.getTime(); t <= max; t += interval){
                ticks.push({ value:t });
            }

            scale.ticks = ticks;
        },

        ticks:{
            color:"#000",

            callback:function(value, index, ticks){
                const tickValue = ticks[index].value;

                const d = new Date(tickValue);
                const h = String(d.getHours()).padStart(2,"0");
                const m = String(d.getMinutes()).padStart(2,"0");

                return [h + "時", m + "分"];
            },

            maxRotation:0,
            autoSkip:true,
            maxTicksLimit:8
        
                }
            }
        }
    };
}

function syncZoom(sourceChart){

    if(syncingZoom) return;
    syncingZoom = true;

    const xScale = sourceChart.scales.x;

    allCharts.forEach(chart=>{
        if(chart && chart !== sourceChart){
            chart.options.scales.x.min = xScale.min;
            chart.options.scales.x.max = xScale.max;
            chart.update("none");
        }
    });

    syncingZoom = false;
}

async function fetchDataSafe(userId, pointId){

    const controller = new AbortController();
    const timeoutId = setTimeout(()=>controller.abort(), 10000);

    try{
        const url = `get_data.php?user_id=${encodeURIComponent(userId)}&point_id=${encodeURIComponent(pointId)}`;

        const res = await fetch(url, {
            signal:controller.signal,
            cache:"no-store"
        });

        clearTimeout(timeoutId);

        if(!res.ok){
            return { pointId, data:[], error:`${pointId}：HTTPエラー ${res.status}` };
        }

        const text = await res.text();

        if(!text.trim()){
            return { pointId, data:[], error:`${pointId}：空のレスポンス` };
        }

        let data;

        try{
            data = JSON.parse(text);
        }catch(e){
            return { pointId, data:[], error:`${pointId}：JSON形式ではありません` };
        }

        if(!Array.isArray(data)){
            return { pointId, data:[], error:`${pointId}：配列データではありません` };
        }

        return { pointId, data, error:null };

    }catch(e){

        clearTimeout(timeoutId);

        if(e.name === "AbortError"){
            return { pointId, data:[], error:`${pointId}：通信タイムアウト` };
        }

        return { pointId, data:[], error:`${pointId}：通信エラー` };
    }
}

function parseData(data, minTime){

    return data.map(d=>{
        const date = new Date(d.recorded_at);

        return {
            x:date,
            xValue:date.getTime(),
            temp:d.temperature !== null && d.temperature !== undefined ? Number(d.temperature) : null,
            hum:d.humidity !== null && d.humidity !== undefined ? Number(d.humidity) : null,
            co2:d.co2 !== null && d.co2 !== undefined ? Number(d.co2) : null,
            solar:d.solar_radiation !== null && d.solar_radiation !== undefined ? Number(d.solar_radiation) : null,
            volt:d.voltage !== null && d.voltage !== undefined ? Number(d.voltage) : null
        };
    }).filter(d=>
        !isNaN(d.xValue) &&
        d.x >= minTime
    );
}

function createTempHumChart(canvasId, parsed, minTime, maxTime){

    return new Chart(document.getElementById(canvasId),{
        type:"line",
        data:{
            datasets:[
                {
                    label:"湿度 (%)",
                    data:parsed
                        .filter(d=>d.hum !== null && !isNaN(d.hum))
                        .map(d=>({x:d.xValue,y:d.hum})),
                    yAxisID:"yHum",
                    borderColor:"rgb(0, 0, 255)",
                    backgroundColor:"rgba(0, 0, 255, 0.15)",
                    pointBackgroundColor:"rgb(0, 0, 255)",
                    pointRadius:0,
                    borderWidth:2,
                    tension:0.2
                },
                {
                    label:"温度 (℃)",
                    data:parsed
                        .filter(d=>d.temp !== null && !isNaN(d.temp))
                        .map(d=>({x:d.xValue,y:d.temp})),
                    yAxisID:"yTemp",
                    borderColor:"rgb(255, 0, 0)",
                    backgroundColor:"rgba(255, 0, 0, 0.15)",
                    pointBackgroundColor:"rgb(255, 0, 0)",
                    pointRadius:0,
                    borderWidth:2,
                    tension:0.2
                }
            ]
        },
        options:{
            ...baseOptions(minTime,maxTime),
            scales:{
                ...baseOptions(minTime,maxTime).scales,
yHum:{
    position:"left",
    min:humMin,
    max:humMax,
    ticks:{
        stepSize:10,
        color:"#000"
    }
},
yTemp:{

function createDiffChart(canvasId, p01, p02, minTime, maxTime){

    const tempDiffData = [];
const humDiffData = [];

// P01の時刻に一番近いP02データを探す
// ずれ許容：6分（360秒）以内
const toleranceMs = 360 * 1000;

p01.forEach(d=>{

    let nearestP02 = null;
    let nearestDiff = Infinity;

    p02.forEach(p=>{
        const diff = Math.abs(d.xValue - p.xValue);

        if(diff < nearestDiff){
            nearestDiff = diff;
            nearestP02 = p;
        }
    });

    if(!nearestP02) return;

    // 時刻差が大きすぎるものは使わない
    if(nearestDiff > toleranceMs) return;

    const p02Data = nearestP02;

        if(d.temp !== null && p02Data.temp !== null && !isNaN(d.temp) && !isNaN(p02Data.temp)){
            tempDiffData.push({ x:d.xValue, y:d.temp - p02Data.temp });
        }

        if(d.hum !== null && p02Data.hum !== null && !isNaN(d.hum) && !isNaN(p02Data.hum)){
            humDiffData.push({ x:d.xValue, y:d.hum - p02Data.hum });
        }
    });

    return new Chart(document.getElementById(canvasId),{
        type:"line",
        data:{
            datasets:[
                {
                    label:"温度差 P01−P02 (℃)",
                    data:tempDiffData,
                    borderColor:"rgb(255, 0, 0)",
                    backgroundColor:"rgba(255, 0, 0, 0.15)",
                    pointBackgroundColor:"rgb(255, 0, 0)",
                    pointRadius:0,
                    borderWidth:2,
                    tension:0.2
                },
                {
                    label:"湿度差 P01−P02 (%)",
                    data:humDiffData,
                    borderColor:"rgb(0, 0, 255)",
                    backgroundColor:"rgba(0, 0, 255, 0.15)",
                    pointBackgroundColor:"rgb(0, 0, 255)",
                    pointRadius:0,
                    borderWidth:2,
                    tension:0.2
                }
            ]
        },
        options:{
            ...baseOptions(minTime,maxTime),
            scales:{
                ...baseOptions(minTime,maxTime).scales,
y:{
    min:-5,
    max:5,
    ticks:{
        stepSize:1,
        color:"#000"
    },
    title:{
        display:true,
        text:"差",
        color:"#000"
    }
}        }
        }
    });
}

function createOutsideDiffChart(canvasId, p01, p11, minTime, maxTime){

    const tempDiffData = [];
    const toleranceMs = 360 * 1000;

    p01.forEach(d=>{

        let nearestP11 = null;
        let nearestDiff = Infinity;

        p11.forEach(p=>{
            const diff = Math.abs(d.xValue - p.xValue);

            if(diff < nearestDiff){
                nearestDiff = diff;
                nearestP11 = p;
            }
        });

        if(!nearestP11) return;
        if(nearestDiff > toleranceMs) return;

        if(d.temp !== null && nearestP11.temp !== null && !isNaN(d.temp) && !isNaN(nearestP11.temp)){
            tempDiffData.push({ x:d.xValue, y:d.temp - nearestP11.temp });

    });

    return new Chart(document.getElementById(canvasId),{

function createSingleChart(canvasId, parsed, key, label, unit, minTime, maxTime){

    let color = "rgb(153, 102, 255)";
    let bg = "rgba(153, 102, 255, 0.15)";

    if(key === "solar"){
        color = "rgb(255, 205, 86)";
        bg = "rgba(255, 205, 86, 0.2)";
    }

    if(key === "co2"){
        color = "rgb(100, 100, 100)";
        bg = "rgba(100, 100, 100, 0.15)";
    }

    if(key === "volt"){
        color = "rgb(0, 160, 80)";
        bg = "rgba(0, 160, 80, 0.2)";
    }

    return new Chart(document.getElementById(canvasId),{
        type:"line",
        data:{
            datasets:[{
                label:label,
                data:parsed
                    .filter(d=>d[key] !== null && !isNaN(d[key]))
                    .map(d=>({x:d.xValue,y:d[key]})),
                borderColor:color,
                backgroundColor:bg,
                pointBackgroundColor:color,
                pointRadius:0,
                borderWidth:2,
                tension:0.2
            }]
        },
        options:{
            ...baseOptions(minTime,maxTime),
            scales:{
                ...baseOptions(minTime,maxTime).scales,
            y:{
    min: key === "volt" || key === "co2" ? 0 : undefined,

    ticks:{
        stepSize: key === "co2" ? 50 : undefined,
        color:"#000",

        callback:function(value){
            if(key === "volt"){
                return Math.round(value);
            }
            return value;
        }
    },

    title:{
        display:true,
        text:unit,
        color:"#000"
    }
}
            }
        }
    });
}

async function loadData(){

    const userId = document.getElementById("userId").value.trim();
    const msg = document.getElementById("message");

    if(!userId){
        msg.innerText = "user_id を入力してください";
        return;
    }

    localStorage.setItem("usui_user_id", userId);
    saveUserIdHistory(userId);

    msg.innerText = "読み込み中...";

    document.getElementById("tempNow").innerText = "-";
    document.getElementById("dewNow").innerText = "-";
    document.getElementById("humNow").innerText = "-";
    document.getElementById("todayMax").innerText = "-";
    document.getElementById("todayMin").innerText = "-";
    document.getElementById("yMax").innerText = "-";
    document.getElementById("yMin").innerText = "-";

    destroyCharts();

    try{

        const now = new Date();
        const minTime = new Date(now.getTime() - 72*60*60*1000);
        const voltMinTime = new Date(now.getTime() - 30*24*60*60*1000);

        const results = await Promise.all([
    fetchDataSafe(userId,"P01"),
    fetchDataSafe(userId,"P02"),
    fetchDataSafe(userId,"P11"),
    fetchDataSafe(userId,"P31"),
    fetchDataSafe(userId,"P21"),
    fetchDataSafe(userId,"P91")
]);

        const resultP01 = results.find(r=>r.pointId === "P01");
        const resultP02 = results.find(r=>r.pointId === "P02");
        const resultP11 = results.find(r=>r.pointId === "P11");
const resultP31 = results.find(r=>r.pointId === "P31");
const resultP21 = results.find(r=>r.pointId === "P21");
const resultP91 = results.find(r=>r.pointId === "P91");

        const p01 = parseData(resultP01.data, minTime);
        const p02 = parseData(resultP02.data, minTime);
        const p11 = parseData(resultP11.data, minTime);
        const p31 = parseData(resultP31.data, minTime);
const p21 = parseData(resultP21.data, minTime);
const p91 = parseData(resultP91.data, voltMinTime);




        const errors = results
            .filter(r=>r.error)
            .map(r=>r.error);

        if(!p01.length && !p02.length && !p11.length){
            msg.innerText = "No data（72時間内データなし）" + (errors.length ? " / " + errors.join(" / ") : "");
            return;
        }

        if(p01.length){
            const validP01 = p01.filter(d=>
                d.temp !== null &&
                d.hum !== null &&
                !isNaN(d.temp) &&
                !isNaN(d.hum)
            );

            if(validP01.length){
                const last = validP01[validP01.length - 1];

                document.getElementById("tempNow").innerText = last.temp.toFixed(1);
                document.getElementById("dewNow").innerText = calcDewPoint(last.temp, last.hum).toFixed(1);
                document.getElementById("humNow").innerText = last.hum.toFixed(1);

                const todayStart = new Date();
                todayStart.setHours(0,0,0,0);

                const todayData = validP01.filter(d=>d.x>=todayStart && d.x<=now);

                if(todayData.length){
                    const todayTemps = todayData.map(d=>d.temp);
                    document.getElementById("todayMax").innerText = Math.max(...todayTemps).toFixed(1);
                    document.getElementById("todayMin").innerText = Math.min(...todayTemps).toFixed(1);
                }

                const yStart = new Date();
                yStart.setDate(yStart.getDate() - 1);
                yStart.setHours(0,0,0,0);

                const yEnd = new Date(yStart);
                yEnd.setHours(23,59,59,999);

                const yData = validP01.filter(d=>d.x>=yStart && d.x<=yEnd);

                if(yData.length){
                    const temps = yData.map(d=>d.temp);
                    document.getElementById("yMax").innerText = Math.max(...temps).toFixed(1);
                    document.getElementById("yMin").innerText = Math.min(...temps).toFixed(1);
                }
            }
        }

        tempChartP01 = createTempHumChart("tempChartP01", p01, minTime, now);
        tempChartP02 = createTempHumChart("tempChartP02", p02, minTime, now);
        tempChartP11 = createTempHumChart("tempChartP11", p11, minTime, now);
        outsideDiffChart = createOutsideDiffChart("outsideDiffChart", p01, p11, minTime, now);

        vaporChart = createVaporChart("vaporChart", p01, minTime, now);

        solarChart = createSingleChart("solarChart", p31, "solar", "日射", "日射", minTime, now);
        co2Chart = createSingleChart("co2Chart", p21, "co2", "co2", "ppm", minTime, now);

        diffChart = createDiffChart("diffChart", p01, p02, minTime, now);

        voltChart = createSingleChart("voltChart", p91, "volt", "電圧", "V", voltMinTime, now);

        allCharts = [
            tempChartP01,
            tempChartP02,
            tempChartP11,
            outsideDiffChart,
            vaporChart,
            solarChart,
            co2Chart,
            diffChart,
            voltChart
        ];

        msg.innerText = errors.length ? errors.join(" / ") : "";

    }catch(e){
        msg.innerText = "画面側エラー：" + e.message;
        console.error(e);
    }
}

function destroyCharts(){
    allCharts.forEach(c=>{
        if(c) c.destroy();
    });
    allCharts = [];
}

function resetZoom(){
    allCharts.forEach(c=>{
        if(c) c.resetZoom();
    });
}

function applyYAxis(){

    tempMin = Number(document.getElementById("tempMin").value);
    tempMax = Number(document.getElementById("tempMax").value);

    humMin = Number(document.getElementById("humMin").value);
    humMax = Number(document.getElementById("humMax").value);

    loadData();
}

function downloadCSV(){

    const userId = document.getElementById("userId").value.trim();
    const start = document.getElementById("csvStart").value;
    const end = document.getElementById("csvEnd").value;

    if(!userId){
        alert("user_id を入力してください");
        return;
    }

    if(!start || !end){
        alert("開始日時と終了日時を入力してください");
        return;
    }

    localStorage.setItem("usui_user_id", userId);
    saveUserIdHistory(userId);

    const url =
        "download_csv.php"
        + "?user_id=" + encodeURIComponent(userId)
        + "&start=" + encodeURIComponent(start)
        + "&end=" + encodeURIComponent(end);

    window.open(url, "_blank");
}
