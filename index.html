<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IoTダッシュボード</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>

<style>
body {
    font-family: sans-serif;
    margin: 10px;
}

.status-container {
    display: flex;
    gap: 24px;
    margin-bottom: 20px;
}


.status-box {
    display: flex;
    align-items: center;
    font-size: 1.3em;
    font-weight: bold;
    border: 3px solid #4CAF50;
    border-radius: 18px;
    padding: 14px 22px;
    background: linear-gradient(135deg, #e0ffe0 0%, #f0f8ff 100%);
    box-shadow: 0 4px 16px rgba(76,175,80,0.08);
    min-width: 160px;
    justify-content: center;
}

.status-box .icon {
    font-size: 1.2em;
    margin-right: 12px;
}

.status-box .value {
    font-size: 0.95em;
    margin: 0 6px;
}

.box {
    margin-bottom: 20px;
}

.chart-container {
    width: 100%;
    max-width: 600px;
    height: 400px;
}

button {
    margin: 5px;
}
</style>
</head>

<body>

<div class="status-container">
    <div class="status-box">
        <span class="icon">🌡</span>
        <span class="label">現在温度：</span>
        <span class="value" id="nowTemp">-</span>
        <span class="unit">℃</span>
    </div>
    <div class="status-box">
        <span class="icon">💧</span>
        <span class="label">現在湿度：</span>
        <span class="value" id="nowHum">-</span>
        <span class="unit">%</span>
    </div>
</div>

<div class="status-container">
    <div class="status-box" style="border-color: #ff6b6b; background: linear-gradient(135deg, #ffe0e0 0%, #fff5f5 100%);">
        <span class="icon">▲</span>
        <span class="label">前日最高：</span>
        <span class="value" id="yesterdayMax">-</span>
        <span class="unit">℃</span>
    </div>
    <div class="status-box" style="border-color: #6b9fff; background: linear-gradient(135deg, #e0e8ff 0%, #f0f5ff 100%);">
        <span class="icon">▼</span>
        <span class="label">前日最低：</span>
        <span class="value" id="yesterdayMin">-</span>
        <span class="unit">℃</span>
    </div>
</div>

<div class="box">
    開始：<input type="datetime-local" id="start">
    終了：<input type="datetime-local" id="end">
    <button onclick="downloadCSV()">CSVダウンロード</button>
</div>

<div class="box">
    <button onclick="resetZoom()">表示サイズnoリセット</button>
</div>

<h3>温度・湿度</h3>
<div class="chart-container">
    <canvas id="tempChart"></canvas>
</div>

<script>

let tempChart;
let lastData = [];

function formatDate(d) {
    const pad = n => n.toString().padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ` +
           `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

async function loadData() {

    const res = await fetch('/get_data.php');
    if (!res.ok) {
        console.error('Fetch error:', res.status, await res.text());
        return;
    }
    const data = await res.json();
    console.log('Received data:', data);

    if (!Array.isArray(data) || data.length === 0) {
        console.warn('No data received');
        return;
    }

    lastData = data;

    const parsed = data.map(d => ({
        x: new Date(d.recorded_at),
        temp: Number(d.temperature),
        hum: Number(d.humidity)
    }));

    const now = new Date();
    const maxRange = new Date(now.getTime());
    const minRange = new Date(now.getTime() - 72 * 60 * 60 * 1000); // 72時間

    const filtered = parsed.filter(d => d.x >= minRange && d.x <= maxRange);

    const tempData = filtered.map(d => ({ x: d.x, y: d.temp }));
    const humData = filtered.map(d => ({ x: d.x, y: d.hum }));

    // 最新値表示
    if (filtered.length > 0) {
        const last = filtered[filtered.length - 1];
        document.getElementById("nowTemp").innerText = last.temp;
        document.getElementById("nowHum").innerText = last.hum;
    }

    // 前日の最高・最低温度を計算
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    yesterday.setHours(0, 0, 0, 0);
    const yesterdayEnd = new Date(yesterday);
    yesterdayEnd.setHours(23, 59, 59, 999);

    const yesterdayData = parsed.filter(d => d.x >= yesterday && d.x <= yesterdayEnd);
    if (yesterdayData.length > 0) {
        const temps = yesterdayData.map(d => d.temp);
        const maxTemp = Math.max(...temps);
        const minTemp = Math.min(...temps);
        document.getElementById("yesterdayMax").innerText = maxTemp;
        document.getElementById("yesterdayMin").innerText = minTemp;
    }

    const options = {
        responsive: true,
        maintainAspectRatio: false,
        parsing: false,

        interaction: {
            mode: 'index',
            intersect: false
        },

        scales: {
            x: {
                type: 'time',
                time: {
                    unit: 'hour',
                    displayFormats: {
                        hour: 'MM/dd HH:mm'
                    }
                },
                ticks: {
                    maxTicksLimit: 12
                },
                min: minRange,
                max: maxRange,
                grid: {
                    color: function(context) {
                        if (context.tick.value === 0) return 'rgba(0,0,0,0.3)';
                        return 'rgba(0,0,0,0.1)';
                    }
                }
            },
            y: {
                min: 0,
                ticks: {
                    stepSize: 10
                }
            }
        },

        plugins: {
            tooltip: {
                yAlign: 'bottom',
                xAlign: 'center',
                callbacks: {
                    label: function(context) {
                        const label = context.dataset.label || '';
                        const value = context.parsed.y;
                        if (label === '温度') {
                            return `${label}: ${value}℃`;
                        } else {
                            return `${label}: ${value}%`;
                        }
                    }
                }
            },
            zoom: {
                pan: {
                    enabled: true,
                    mode: 'x'
                },
                zoom: {
                    wheel: { enabled: true },
                    drag: { enabled: true },
                    mode: 'x'
                }
            }
        },

        elements: {
            line: {
                borderWidth: 1
            },
            point: {
                radius: 0
            }
        }
    };

    if (!tempChart) {

        tempChart = new Chart(document.getElementById("tempChart"), {
            type: "line",
            data: {
                datasets: [
                    {
                        label: "温度",
                        data: tempData,
                        borderColor: "red",
                        yAxisID: 'yTemp',
                        backgroundColor: "rgba(255, 0, 0, 0.1)",
                        fill: true
                    },
                    {
                        label: "湿度",
                        data: humData,
                        borderColor: "blue",
                        yAxisID: 'yHum',
                        backgroundColor: "rgba(0, 0, 255, 0.1)",
                        fill: true
                    }
                ]
            },
            options: {
                ...options,
                scales: {
                    x: options.scales.x,
                    yHum: {
                        position: 'left',
                        min: 40,
                        max: 100,
                        ticks: { stepSize: 10 },
                        title: { display: true, text: '湿度 (%)' }
                    },
                    yTemp: {
                        position: 'right',
                        min: 15,
                        max: 40,
                        ticks: { stepSize: 10 },
                        title: { display: true, text: '温度 (℃)' }
                    }
                }
            }
        });

    } else {
        tempChart.data.datasets[0].data = tempData;
        tempChart.data.datasets[1].data = humData;

        // ★ズーム保持（ここ重要）
        const tempState = tempChart.getZoomedState?.();

        tempChart.update();
    }
}

// リセット
function resetZoom() {
    tempChart.resetZoom();
}

// CSVダウンロード
function downloadCSV() {

    const start = new Date(document.getElementById("start").value);
    const end = new Date(document.getElementById("end").value);

    const filtered = lastData.filter(d => {
        const t = new Date(d.recorded_at);
        return t >= start && t <= end;
    });

    let csv = "datetime,temperature,humidity\n";

    filtered.forEach(d => {
        csv += `${d.recorded_at},${d.temperature},${d.humidity}\n`;
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = `greenhouse_${start.toISOString()}_to_${end.toISOString()}.csv`;
    a.click();
}

loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
