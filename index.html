<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>USUI Tech</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-crosshair"></script>

<style>
body {
    font-family: sans-serif;
    margin: 20px;
}

.box {
    margin: 10px 0;
}

.dashboard {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 18px;
}

.panel {
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 10px;
    background: #fafafa;
}

.chart-container {
    width: 100%;
    height: 330px;
}

button {
    margin: 5px;
}

#message {
    color: #666;
    margin: 10px 0;
}

@media (max-width: 1200px) {
    .dashboard {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="box">
user_id：
<input type="text" id="userId" placeholder="例: T0001">
<button onclick="loadData()">表示</button>
<button onclick="resetZoomAll()">ズームリセット</button>
</div>

<div id="message"></div>

<div class="dashboard">

    <div class="panel">
        <h3>P01 温度・湿度</h3>
        <div class="chart-container">
            <canvas id="chartP01"></canvas>
        </div>
    </div>

    <div class="panel">
        <h3>P02 温度・湿度</h3>
        <div class="chart-container">
            <canvas id="chartP02"></canvas>
        </div>
    </div>

    <div class="panel">
        <h3>温度差 P01 − P02</h3>
        <div class="chart-container">
            <canvas id="chartDiff"></canvas>
        </div>
    </div>

    <div class="panel">
        <h3>P11 温度・湿度</h3>
        <div class="chart-container">
            <canvas id="chartP11"></canvas>
        </div>
    </div>

    <div class="panel">
        <h3>P11 CO2</h3>
        <div class="chart-container">
            <canvas id="chartCO2"></canvas>
        </div>
    </div>

</div>

<script>

let chartP01, chartP02, chartP11, chartDiff, chartCO2;
let isSyncing = false;

function getAllCharts(){
    return [chartP01, chartP02, chartP11, chartDiff, chartCO2].filter(c => c);
}

function syncZoom(sourceChart){
    if(isSyncing) return;

    isSyncing = true;

    const min = sourceChart.scales.x.min;
    const max = sourceChart.scales.x.max;

    getAllCharts().forEach(chart => {
        if(chart !== sourceChart){
            chart.options.scales.x.min = min;
            chart.options.scales.x.max = max;
            chart.update("none");
        }
    });

    isSyncing = false;
}

function baseOptions(minTime, maxTime){
    return {
        parsing: false,
        responsive: true,
        maintainAspectRatio: false,

        interaction: {
            mode: "index",
            intersect: false
        },

        plugins: {
            legend: {
                display: true
            },

            tooltip: {
                mode: "index",
                intersect: false
            },

            zoom: {
                zoom: {
                    wheel: { enabled: true },
                    pinch: { enabled: true },
                    drag: { enabled: true },
                    mode: "x",
                    onZoom: ({chart}) => syncZoom(chart)
                },
                pan: {
                    enabled: true,
                    mode: "x",
                    onPan: ({chart}) => syncZoom(chart)
                }
            },

            crosshair: {
                line: {
                    color: "#000",
                    width: 1
                },
                sync: {
                    enabled: true,
                    group: 1,
                    suppressTooltips: false
                },
                zoom: {
                    enabled: false
                }
            }
        },

        scales: {
            x: {
                type: "time",
                min: minTime,
                max: maxTime,
                time: {
                    tooltipFormat: "HH:mm",
                    displayFormats: {
                        minute: "HH:mm",
                        hour: "HH:mm"
                    }
                },
                ticks: {
                    maxRotation: 0,
                    autoSkip: true
                }
            }
        }
    };
}

async function fetchData(userId, pointId){
    const res = await fetch(`get_data.php?user_id=${encodeURIComponent(userId)}&point_id=${encodeURIComponent(pointId)}`);
    return await res.json();
}

function parseData(data, minTime){
    return data.map(d => ({
        x: new Date(d.recorded_at),
        temp: d.temperature !== null ? Number(d.temperature) : null,
        hum: d.humidity !== null ? Number(d.humidity) : null,
        co2: d.CO2 !== null && d.CO2 !== undefined ? Number(d.CO2) : null
    })).filter(d => d.x >= minTime);
}

function createTempHumChart(canvasId, parsed, minTime, maxTime){
    return new Chart(document.getElementById(canvasId), {
        type: "line",
        data: {
            datasets: [
                {
                    label: "湿度 (%)",
                    data: parsed.map(d => ({x: d.x, y: d.hum})),
                    yAxisID: "yHum",
                    pointRadius: 1.5,
                    spanGaps: true
                },
                {
                    label: "温度 (℃)",
                    data: parsed.map(d => ({x: d.x, y: d.temp})),
                    yAxisID: "yTemp",
                    pointRadius: 1.5,
                    spanGaps: true
                }
            ]
        },
        options: {
            ...baseOptions(minTime, maxTime),
            scales: {
                ...baseOptions(minTime, maxTime).scales,
                yHum: {
                    position: "left",
                    min: 50,
                    max: 100
                },
                yTemp: {
                    position: "right",
                    min: 10,
                    max: 60
                }
            }
        }
    });
}

function findNearest(targetTime, data, limitMs){
    let nearest = null;
    let nearestDiff = limitMs;

    data.forEach(d => {
        const diff = Math.abs(d.x.getTime() - targetTime.getTime());
        if(diff <= nearestDiff){
            nearest = d;
            nearestDiff = diff;
        }
    });

    return nearest;
}

function createDiffData(p01, p02){
    const limitMs = 2 * 60 * 1000;

    return p01.map(d1 => {
        const d2 = findNearest(d1.x, p02, limitMs);

        if(!d2 || d1.temp === null || d2.temp === null){
            return null;
        }

        return {
            x: d1.x,
            y: d1.temp - d2.temp
        };
    }).filter(d => d !== null);
}

function createDiffChart(canvasId, diffData, minTime, maxTime){
    return new Chart(document.getElementById(canvasId), {
        type: "line",
        data: {
            datasets: [
                {
                    label: "温度差 P01−P02 (℃)",
                    data: diffData,
                    pointRadius: 1.5,
                    spanGaps: true
                }
            ]
        },
        options: {
            ...baseOptions(minTime, maxTime),
            scales: {
                ...baseOptions(minTime, maxTime).scales,
                y: {
                    title: {
                        display: true,
                        text: "℃"
                    }
                }
            }
        }
    });
}

function createCO2Chart(canvasId, parsed, minTime, maxTime){
    return new Chart(document.getElementById(canvasId), {
        type: "line",
        data: {
            datasets: [
                {
                    label: "CO2 (ppm)",
                    data: parsed.map(d => ({x: d.x, y: d.co2})),
                    pointRadius: 1.5,
                    spanGaps: true
                }
            ]
        },
        options: {
            ...baseOptions(minTime, maxTime),
            scales: {
                ...baseOptions(minTime, maxTime).scales,
                y: {
                    title: {
                        display: true,
                        text: "ppm"
                    }
                }
            }
        }
    });
}

async function loadData(){

    const userId = document.getElementById("userId").value.trim();
    const msg = document.getElementById("message");

    if(!userId){
        msg.innerText = "user_id を入力してください";
        return;
    }

    msg.innerText = "読み込み中...";

    try{
        const now = new Date();
        const minTime = new Date(now.getTime() - 72 * 60 * 60 * 1000);

        const [dataP01, dataP02, dataP11] = await Promise.all([
            fetchData(userId, "P01"),
            fetchData(userId, "P02"),
            fetchData(userId, "P11")
        ]);

        const p01 = parseData(dataP01, minTime);
        const p02 = parseData(dataP02, minTime);
        const p11 = parseData(dataP11, minTime);

        getAllCharts().forEach(c => c.destroy());

        chartP01 = createTempHumChart("chartP01", p01, minTime, now);
        chartP02 = createTempHumChart("chartP02", p02, minTime, now);
        chartP11 = createTempHumChart("chartP11", p11, minTime, now);

        const diffData = createDiffData(p01, p02);
        chartDiff = createDiffChart("chartDiff", diffData, minTime, now);

        chartCO2 = createCO2Chart("chartCO2", p11, minTime, now);

        msg.innerText = "";

    }catch(e){
        console.error(e);
        msg.innerText = "通信エラー（get_data.php またはDBを確認してください）";
    }
}

function resetZoomAll(){
    getAllCharts().forEach(chart => {
        chart.resetZoom();
    });
}

</script>

</body>
</html>
