<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>USUI Tech</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-crosshair"></script>

<style>
body { font-family: sans-serif; margin:20px; }

.box { margin:10px 0; }

.dashboard {
    display:grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap:18px;
}

.panel {
    border:1px solid #ddd;
    border-radius:10px;
    padding:10px;
    background:#fafafa;
}

.chart-container {
    width:100%;
    height:320px;
}

@media (max-width:1200px){
    .dashboard { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<div class="box">
user_id：
<input type="text" id="userId" placeholder="例: T0001">
<button onclick="loadData()">表示</button>
<button onclick="resetZoomAll()">ズームリセット</button>
</div>

<div id="message"></div>

<div class="dashboard">

<div class="panel">
<h3>P01</h3>
<canvas id="chartP01"></canvas>
</div>

<div class="panel">
<h3>P02</h3>
<canvas id="chartP02"></canvas>
</div>

<div class="panel">
<h3>差分</h3>
<canvas id="chartDiff"></canvas>
</div>

<div class="panel">
<h3>P11</h3>
<canvas id="chartP11"></canvas>
</div>

<div class="panel">
<h3>P21 CO2</h3>
<canvas id="chartCO2"></canvas>
</div>

<div class="panel">
<h3>P11 日射</h3>
<canvas id="chartSolar"></canvas>
</div>

<div class="panel">
<h3>P11 電圧</h3>
<canvas id="chartVolt"></canvas>
</div>

</div>

<script>

let chartP01, chartP02, chartP11, chartDiff, chartCO2, chartSolar, chartVolt;
let isSyncing = false;

function getAllCharts(){
    return [chartP01, chartP02, chartP11, chartDiff, chartCO2, chartSolar, chartVolt].filter(c => c);
}

function syncZoom(sourceChart){
    if(isSyncing) return;
    isSyncing = true;

    const min = sourceChart.scales.x.min;
    const max = sourceChart.scales.x.max;

    getAllCharts().forEach(chart => {
        if(chart !== sourceChart){
            chart.options.scales.x.min = min;
            chart.options.scales.x.max = max;
            chart.update("none");
        }
    });

    isSyncing = false;
}

function baseOptions(minTime,maxTime){
    return {
        parsing:false,
        responsive:true,
        maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
            zoom:{
                zoom:{
                    wheel:{enabled:true},
                    pinch:{enabled:true},
                    drag:{enabled:true},
                    mode:'x',
                    onZoom:({chart}) => syncZoom(chart)
                },
                pan:{
                    enabled:true,
                    mode:'x',
                    onPan:({chart}) => syncZoom(chart)
                }
            },
            crosshair:{
                line:{color:'#000',width:1},
                sync:{enabled:true, group:1},
                zoom:{enabled:false}
            }
        },
        scales:{
            x:{
                type:"time",
                min:minTime,
                max:maxTime,
                time:{
                    tooltipFormat:"HH:mm",
                    displayFormats:{
                        minute:"HH:mm",
                        hour:"HH:mm"
                    }
                }
            }
        }
    };
}

// ★ 0時ライン（軽量版）
const midnightLinePlugin = {
    id:"midnightLine",
    afterDraw(chart){
        const xScale = chart.scales.x;
        const ctx = chart.ctx;
        const area = chart.chartArea;

        if(!xScale) return;

        const start = new Date(xScale.min);
        const end = new Date(xScale.max);

        const d = new Date(start);
        d.setHours(0,0,0,0);

        if(d < start) d.setDate(d.getDate()+1);

        ctx.save();
        ctx.strokeStyle="rgba(0,0,0,0.3)";
        ctx.setLineDash([4,4]);

        while(d <= end){
            const x = xScale.getPixelForValue(d);
            ctx.beginPath();
            ctx.moveTo(x, area.top);
            ctx.lineTo(x, area.bottom);
            ctx.stroke();
            d.setDate(d.getDate()+1);
        }

        ctx.restore();
    }
};

Chart.register(midnightLinePlugin);

async function fetchData(userId, pointId){
    const res = await fetch(`get_data.php?user_id=${userId}&point_id=${pointId}`);
    return await res.json();
}

function parseData(data, minTime){
    return data.map(d=>({
        x:new Date(d.recorded_at),
        temp:Number(d.temperature),
        hum:Number(d.humidity),
        co2:d.CO2 ? Number(d.CO2) : null,
        solar:d.solar_radiation ? Number(d.solar_radiation) : null,
        volt:d.voltage ? Number(d.voltage) : null
    })).filter(d=>d.x>=minTime);
}

function createTempHumChart(canvasId, parsed, minTime, maxTime){
    return new Chart(document.getElementById(canvasId),{
        type:"line",
        data:{
            datasets:[
                {label:"湿度", data:parsed.map(d=>({x:d.x,y:d.hum})), yAxisID:"yHum"},
                {label:"温度", data:parsed.map(d=>({x:d.x,y:d.temp})), yAxisID:"yTemp"}
            ]
        },
        options:{
            ...baseOptions(minTime,maxTime),
            scales:{
                ...baseOptions(minTime,maxTime).scales,
                yHum:{position:"left",min:50,max:100,ticks:{stepSize:10}},
                yTemp:{position:"right",min:10,max:60,ticks:{stepSize:10}}
            }
        }
    });
}

function createSingleChart(canvasId, parsed, key, label, minTime, maxTime){
    return new Chart(document.getElementById(canvasId),{
        type:"line",
        data:{
            datasets:[{label:label,data:parsed.map(d=>({x:d.x,y:d[key]}))}]
        },
        options:{...baseOptions(minTime,maxTime)}
    });
}

function createDiff(p01,p02){
    return p01.map((d,i)=>{
        if(!p02[i]) return null;
        return {
            x:d.x,
            y:d.temp - p02[i].temp
        };
    }).filter(d=>d);
}

async function loadData(){

    const userId = document.getElementById("userId").value;
    const msg = document.getElementById("message");

    if(!userId){
        msg.innerText="user_idを入力";
        return;
    }

    msg.innerText="読み込み中...";

    const now = new Date();
    const minTime = new Date(now.getTime()-72*60*60*1000);

    const [d1,d2,d3,d4] = await Promise.all([
        fetchData(userId,"P01"),
        fetchData(userId,"P02"),
        fetchData(userId,"P11"),
        fetchData(userId,"P21")
    ]);

    const p01 = parseData(d1,minTime);
    const p02 = parseData(d2,minTime);
    const p11 = parseData(d3,minTime);
    const p21 = parseData(d4,minTime);

    getAllCharts().forEach(c=>c.destroy());

    chartP01 = createTempHumChart("chartP01",p01,minTime,now);
    chartP02 = createTempHumChart("chartP02",p02,minTime,now);
    chartP11 = createTempHumChart("chartP11",p11,minTime,now);

    chartDiff = new Chart(document.getElementById("chartDiff"),{
        type:"line",
        data:{
            datasets:[{
                label:"温度差",
                data:createDiff(p01,p02)
            }]
        },
        options:{...baseOptions(minTime,now)}
    });

    chartCO2 = createSingleChart("chartCO2",p21,"co2","CO2",minTime,now);
    chartSolar = createSingleChart("chartSolar",p11,"solar","日射",minTime,now);
    chartVolt = createSingleChart("chartVolt",p11,"volt","電圧",minTime,now);

    msg.innerText="";
}

function resetZoomAll(){
    getAllCharts().forEach(c=>c.resetZoom());
}

</script>

</body>
</html>
