<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>USUI Tech ウスイテック</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-crosshair"></script>

<style>
body {
    font-family: sans-serif;
    margin: 20px;
}
.chart-container {
    width: 100%;
    max-width: 800px;
    height: 400px;
    margin: auto;
}
.box {
    margin: 10px 0;
}
</style>
</head>

<body>

<h2>🌱 Greenhouse IoT Dashboard</h2>

<!-- ★ 追加：ハウスID -->
<div class="box">
    <label>ハウスID：</label>
    <input type="number" id="userId" value="2">
    <button onclick="loadData()">表示</button>
</div>

<!-- 現在値 -->
<div class="box">
    温度：<span id="nowTemp">-</span> ℃　
    湿度：<span id="nowHum">-</span> %
</div>

<h3>温度・湿度</h3>
<div class="chart-container">
    <canvas id="tempChart"></canvas>
</div>

<script>

let tempChart;
let lastData = [];

// ===== データ取得 =====
async function loadData() {

    const userId = document.getElementById("userId").value;

    if (!userId) {
        alert("ハウスIDを入力してください");
        return;
    }

    const res = await fetch(`/get_data.php?user_id=${userId}`);

    if (!res.ok) {
        console.error("Fetch error");
        return;
    }

    const data = await res.json();

    if (!Array.isArray(data) || data.length === 0) {
        console.warn("データなし");
        return;
    }

    lastData = data;

    const parsed = data.map(d => ({
        x: new Date(d.recorded_at),
        temp: Number(d.temperature),
        hum: Number(d.humidity)
    }));

    // ===== 最新値 =====
    const last = parsed[parsed.length - 1];
    document.getElementById("nowTemp").innerText = last.temp.toFixed(1);
    document.getElementById("nowHum").innerText = last.hum.toFixed(1);

    // ===== グラフ =====
    const tempData = parsed.map(d => ({ x: d.x, y: d.temp }));
    const humData = parsed.map(d => ({ x: d.x, y: d.hum }));

    if (tempChart) tempChart.destroy();

    tempChart = new Chart(document.getElementById("tempChart"), {
        type: "line",
        data: {
            datasets: [
                {
                    label: "温度 (℃)",
                    data: tempData,
                    borderWidth: 2
                },
                {
                    label: "湿度 (%)",
                    data: humData,
                    borderWidth: 2
                }
            ]
        },
        options: {
            parsing: false,
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: {
                    type: "time"
                }
            }
        }
    });
}

// 初回読み込み
loadData();

// 自動更新
setInterval(loadData, 5000);

</script>

</body>
</html>
