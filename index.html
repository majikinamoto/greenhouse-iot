<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>USUI Tech</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-crosshair"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.4.0"></script>

<style>
body { font-family:sans-serif; margin:20px; }
.chart-container { width:100%; max-width:950px; height:420px; margin:20px auto; }
.box { margin:10px 0; }
.status-container { display:flex; flex-wrap:wrap; gap:10px; }
.status-box { border:1px solid #ccc; padding:10px; border-radius:8px; }
</style>
</head>

<body>

<h2>🌱 USUI Tech</h2>

<div class="box">
ハウスID：
<input type="number" id="userId" value="2">
<button onclick="loadData()">表示</button>
<button onclick="resetZoom()">ズームリセット</button>
</div>

<div class="box">
開始：<input type="datetime-local" id="start">
終了：<input type="datetime-local" id="end">
<button onclick="downloadCSV()">CSVダウンロード</button>
</div>

<div class="status-container">
<div class="status-box">温度：<span id="nowTemp">-</span>℃</div>
<div class="status-box">湿度：<span id="nowHum">-</span>%</div>
<div class="status-box">水蒸気量：<span id="nowVapor">-</span> g/m³</div>
<div class="status-box">飽差：<span id="nowRemain">-</span> g/m³</div>
<div class="status-box">前日最高：<span id="yMax">-</span>℃</div>
<div class="status-box">前日最低：<span id="yMin">-</span>℃</div>
</div>

<h3>温度・湿度</h3>
<div class="chart-container"><canvas id="tempChart"></canvas></div>

<script>

let tempChart;
let lastData = [];

function calcVapor(t,h){
    const es=6.1078*Math.exp((17.269*t)/(t+237.3));
    return 216.7*((es*(h/100))/(t+273.15));
}

// ===== CSV（期間指定対応）=====
function downloadCSV(){

    if(!lastData.length) return;

    const startVal = document.getElementById("start").value;
    const endVal = document.getElementById("end").value;

    const start = startVal ? new Date(startVal) : null;
    const end = endVal ? new Date(endVal) : null;

    let csv = "datetime,temp,hum,vapor,remain\n";

    lastData.forEach(d=>{
        const t = new Date(d.recorded_at);

        if(start && t < start) return;
        if(end && t > end) return;

        const temp = Number(d.temperature);
        const hum = Number(d.humidity);
        const vapor = calcVapor(temp,hum);
        const remain = calcVapor(temp,100)-vapor;

        csv += `${d.recorded_at},${temp},${hum},${vapor.toFixed(1)},${remain.toFixed(1)}\n`;
    });

    const blob = new Blob([csv],{type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "greenhouse.csv";
    a.click();
}

// ===== 共通設定 =====
function baseOptions(minTime,maxTime){
    return {
        parsing:false,
        responsive:true,
        interaction:{mode:'index',intersect:false},
        plugins:{
            zoom:{
                limits:{
                    x:{min:minTime,max:maxTime}
                },
                zoom:{
                    drag:{enabled:true},   // ←ドラッグズーム（範囲制限）
                    wheel:false,           // ←ホイール無効（暴走防止）
                    mode:'x'
                },
                pan:{enabled:false}
            },
            crosshair:{
                line:{color:'#000',width:1}
            }
        },
        scales:{
            x:{type:"time",min:minTime,max:maxTime}
        }
    };
}

// ===== データ取得 =====
async function loadData(){

    const userId = document.getElementById("userId").value;
    localStorage.setItem("userId",userId);

    const res = await fetch(`/get_data.php?user_id=${userId}`);
    const data = await res.json();
    if(!data.length) return;

    lastData = data;

    const now = new Date();
    const minTime = new Date(now.getTime()-72*60*60*1000);

    const parsed = data.map(d=>({
        x:new Date(d.recorded_at),
        temp:Number(d.temperature),
        hum:Number(d.humidity)
    })).filter(d=>d.x>=minTime);

    const last = parsed[parsed.length-1];

    document.getElementById("nowTemp").innerText = last.temp.toFixed(1);
    document.getElementById("nowHum").innerText = last.hum.toFixed(1);

    const vapor = calcVapor(last.temp,last.hum);
    const remain = calcVapor(last.temp,100)-vapor;

    document.getElementById("nowVapor").innerText = vapor.toFixed(1);
    document.getElementById("nowRemain").innerText = remain.toFixed(1);

    // 前日
    const yStart = new Date(); yStart.setDate(yStart.getDate()-1); yStart.setHours(0,0,0,0);
    const yEnd = new Date(yStart); yEnd.setHours(23,59,59,999);

    const yData = parsed.filter(d=>d.x>=yStart && d.x<=yEnd);

    if(yData.length){
        const temps = yData.map(d=>d.temp);
        document.getElementById("yMax").innerText = Math.max(...temps).toFixed(1);
        document.getElementById("yMin").innerText = Math.min(...temps).toFixed(1);
    }

    if(tempChart) tempChart.destroy();

    tempChart = new Chart(document.getElementById("tempChart"),{
        type:"line",
        data:{
            datasets:[
                {
                    label:"湿度 (%)",
                    data:parsed.map(d=>({x:d.x,y:d.hum})),
                    yAxisID:"yHum",
                    backgroundColor:"rgba(0,0,255,0.1)"
                },
                {
                    label:"温度 (℃)",
                    data:parsed.map(d=>({x:d.x,y:d.temp})),
                    yAxisID:"yTemp",
                    backgroundColor:"rgba(255,0,0,0.1)"
                }
            ]
        },
        options:{
            ...baseOptions(minTime,now),
            scales:{
                ...baseOptions(minTime,now).scales,
                yHum:{min:50,max:100,position:"left"},
                yTemp:{min:10,max:60,position:"right"}
            }
        }
    });
}

// ===== 初期化 =====
window.onload=()=>{
    const saved=localStorage.getItem("userId");
    if(saved) document.getElementById("userId").value=saved;
    loadData();
};

// ★30分更新
setInterval(loadData,1800000);

function resetZoom(){
    if(tempChart) tempChart.resetZoom();
}

</script>

</body>
</html>
