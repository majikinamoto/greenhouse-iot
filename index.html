<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>USUI Tech</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@1.2.1"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-crosshair@1.2.0"></script>

<style>
body { font-family: sans-serif; margin:20px; }

.grid {
    display:grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap:15px;
}

.chart-container {
    width:100%;
    height:320px;
}

.status-container {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin:10px 0;
}

.status-box {
    border:1px solid #ccc;
    padding:10px;
    border-radius:8px;
    background:#f9f9f9;
}
</style>
</head>

<body>

<div>
user_id：
<input type="text" id="userId">
<button onclick="loadData()">表示</button>
</div>

<div id="message"></div>

<div class="status-container">
<div class="status-box">現在温度（P01）：<span id="tempNow">-</span>℃</div>
<div class="status-box">現在湿度（P01）：<span id="humNow">-</span>%</div>
<div class="status-box">前日最高（P01）：<span id="yMax">-</span>℃</div>
<div class="status-box">前日最低（P01）：<span id="yMin">-</span>℃</div>
</div>

<div class="grid">

<div>
<h4>P01</h4>
<canvas id="tempChartP01"></canvas>

<h4>P11</h4>
<canvas id="tempChartP11"></canvas>

<h4>日射</h4>
<canvas id="solarChart"></canvas>

<h4>電圧</h4>
<canvas id="voltChart"></canvas>
</div>

<div>
<h4>P02</h4>
<canvas id="tempChartP02"></canvas>
</div>

<div>
<h4>差分</h4>
<canvas id="diffChart"></canvas>
</div>

</div>

<script>

let charts=[];

function baseOpt(min,max){
return {
responsive:true,
interaction:{mode:'index',intersect:false},
plugins:{
zoom:{zoom:{wheel:{enabled:true},mode:'x'},pan:{enabled:true,mode:'x'}},
crosshair:{sync:{enabled:true,group:1}}
},
scales:{
x:{
type:'linear',
min:min,
max:max,
ticks:{
callback:v=>{
const d=new Date(v);
return d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");
}
}
}
}
};
}

function lineColor(i){
const colors=[
"#e74c3c","#3498db","#2ecc71","#f1c40f","#9b59b6","#e67e22"
];
return colors[i%colors.length];
}

function makeChart(id,data,keys,min,max){
return new Chart(document.getElementById(id),{
type:"line",
data:{
datasets:keys.map((k,i)=>({
label:k.label,
data:data.filter(d=>d[k.key]!=null).map(d=>({x:d.x,y:d[k.key]})),
borderColor:lineColor(i),
backgroundColor:lineColor(i)+"33",
tension:0.3,
pointRadius:0
}))
},
options:baseOpt(min,max)
});
}

async function loadData(){

const userId=document.getElementById("userId").value;
const msg=document.getElementById("message");

msg.innerText="読み込み中...";

const now=new Date();
const min=new Date(now-72*3600*1000);

const fetchData=async p=>{
const res=await fetch(`get_data.php?user_id=${userId}&point_id=${p}`);
return await res.json();
};

const [p01,p02,p11]=await Promise.all([
fetchData("P01"),
fetchData("P02"),
fetchData("P11")
]);

const parse=d=>d.map(v=>{
const t=new Date(v.recorded_at);
return{
x:t.getTime(),
temp:Number(v.temperature),
hum:Number(v.humidity),
solar:Number(v.solar_radiation),
volt:Number(v.voltage)
};
}).filter(v=>v.x>=min);

const d1=parse(p01);
const d2=parse(p02);
const d3=parse(p11);

charts.forEach(c=>c.destroy());
charts=[];

charts.push(makeChart("tempChartP01",d1,[
{key:"temp",label:"温度"},
{key:"hum",label:"湿度"}
],min,now));

charts.push(makeChart("tempChartP02",d2,[
{key:"temp",label:"温度"},
{key:"hum",label:"湿度"}
],min,now));

charts.push(makeChart("tempChartP11",d3,[
{key:"temp",label:"温度"},
{key:"hum",label:"湿度"}
],min,now));

charts.push(makeChart("solarChart",d3,[
{key:"solar",label:"日射"}
],min,now));

charts.push(makeChart("voltChart",d3,[
{key:"volt",label:"電圧"}
],min,now));

const diff=d1.map(d=>{
const m=Math.floor(d.x/60000);
const f=d2.find(x=>Math.floor(x.x/60000)==m);
if(!f) return null;
return{
x:d.x,
t:d.temp-f.temp,
h:d.hum-f.hum
};
}).filter(x=>x);

charts.push(new Chart(document.getElementById("diffChart"),{
type:"line",
data:{
datasets:[
{
label:"温度差",
data:diff.map(d=>({x:d.x,y:d.t})),
borderColor:"#e74c3c"
},
{
label:"湿度差",
data:diff.map(d=>({x:d.x,y:d.h})),
borderColor:"#3498db"
}
]
},
options:{
...baseOpt(min,now),
scales:{
y:{min:-3,max:3,ticks:{stepSize:1}}
}
}
}));

if(d1.length){
const last=d1[d1.length-1];
document.getElementById("tempNow").innerText=last.temp.toFixed(1);
document.getElementById("humNow").innerText=last.hum.toFixed(1);
}

msg.innerText="";
}

</script>

</body>
</html>
