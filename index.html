<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>USUI Tech</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-crosshair"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.4.0/dist/chartjs-plugin-annotation.min.js"></script>

<style>
body {
    font-family: sans-serif;
    margin: 20px;
}

.box {
    margin: 10px 0;
}

.dashboard {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 18px;
}

.panel {
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 10px;
    background: #fafafa;
}

.chart-container {
    width: 100%;
    height: 330px;
}

button {
    margin: 5px;
}

#message {
    color: #666;
    margin: 10px 0;
}

.p01 { grid-column: 1; }
.p02 { grid-column: 2; }
.diff { grid-column: 3; }

.p11 { grid-column: 1; }
.co2 { grid-column: 2; }

.solar { grid-column: 1; }
.volt { grid-column: 1; }

@media (max-width: 1200px) {
    .dashboard {
        grid-template-columns: 1fr;
    }

    .p01, .p02, .diff, .p11, .co2, .solar, .volt {
        grid-column: 1;
    }
}
</style>
</head>

<body>

<div class="box">
user_id：
<input type="text" id="userId" placeholder="例: T0001">
<button onclick="loadData()">表示</button>
<button onclick="resetZoomAll()">ズームリセット</button>
</div>

<div id="message"></div>

<div class="dashboard">

    <div class="panel p01">
        <h3>P01 温度・湿度</h3>
        <div class="chart-container">
            <canvas id="chartP01"></canvas>
        </div>
    </div>

    <div class="panel p02">
        <h3>P02 温度・湿度</h3>
        <div class="chart-container">
            <canvas id="chartP02"></canvas>
        </div>
    </div>

    <div class="panel diff">
        <h3>差分 P01 − P02</h3>
        <div class="chart-container">
            <canvas id="chartDiff"></canvas>
        </div>
    </div>

    <div class="panel p11">
        <h3>P11 温度・湿度</h3>
        <div class="chart-container">
            <canvas id="chartP11"></canvas>
        </div>
    </div>

    <div class="panel co2">
        <h3>P21 CO2</h3>
        <div class="chart-container">
            <canvas id="chartCO2"></canvas>
        </div>
    </div>

    <div class="panel solar">
        <h3>P11 日射</h3>
        <div class="chart-container">
            <canvas id="chartSolar"></canvas>
        </div>
    </div>

    <div class="panel volt">
        <h3>P11 電圧</h3>
        <div class="chart-container">
            <canvas id="chartVolt"></canvas>
        </div>
    </div>

</div>

<script>

let chartP01, chartP02, chartP11, chartDiff, chartCO2, chartSolar, chartVolt;
let isSyncing = false;

const HUM_COLOR = "#2f80ed";
const TEMP_COLOR = "#eb5757";

function getAllCharts(){
    return [chartP01, chartP02, chartP11, chartDiff, chartCO2, chartSolar, chartVolt].filter(c => c);
}

function syncZoom(sourceChart){
    if(isSyncing) return;

    isSyncing = true;

    const min = sourceChart.scales.x.min;
    const max = sourceChart.scales.x.max;

    getAllCharts().forEach(chart => {
        if(chart !== sourceChart){
            chart.options.scales.x.min = min;
            chart.options.scales.x.max = max;
            chart.update("none");
        }
    });

    isSyncing = false;
}

function createMidnightLines(minTime, maxTime){
    const annotations = {};
    const d = new Date(minTime);

    d.setHours(0, 0, 0, 0);

    if(d < minTime){
        d.setDate(d.getDate() + 1);
    }

    let i = 0;

    while(d <= maxTime){
        annotations["midnight_" + i] = {
            type: "line",
            xMin: new Date(d),
            xMax: new Date(d),
            borderColor: "rgba(0,0,0,0.35)",
            borderWidth: 1,
            borderDash: [6, 6]
        };

        d.setDate(d.getDate() + 1);
        i++;
    }

    return annotations;
}

function baseOptions(minTime, maxTime){
    return {
        parsing: false,
        responsive: true,
        maintainAspectRatio: false,

        interaction: {
            mode: "nearest",
            intersect: false,
            axis: "xy"
        },

        plugins: {
            legend: {
                display: true
            },

            tooltip: {
                mode: "nearest",
                intersect: false,
                position: "nearest"
            },

            zoom: {
                zoom: {
                    wheel: { enabled: true },
                    pinch: { enabled: true },
                    drag: { enabled: true },
                    mode: "x",
                    onZoom: ({chart}) => syncZoom(chart)
                },
                pan: {
                    enabled: true,
                    mode: "x",
                    onPan: ({chart}) => syncZoom(chart)
                }
            },

            crosshair: {
                line: {
                    color: "#000",
                    width: 1
                },
                sync: {
                    enabled: true,
                    group: 1,
                    suppressTooltips: false
                },
                zoom: {
                    enabled: false
                }
            },

            annotation: {
                annotations: createMidnightLines(minTime, maxTime)
            }
        },

        scales: {
            x: {
                type: "time",
                min: minTime,
                max: maxTime,
                time: {
                    tooltipFormat: "HH:mm",
                    displayFormats: {
                        minute: "HH:mm",
                        hour: "HH:mm"
                    }
                },
                ticks: {
                    maxRotation: 0,
                    autoSkip: true
                }
            }
        }
    };
}

async function fetchData(userId, pointId){
    const url = `get_data.php?user_id=${encodeURIComponent(userId)}&point_id=${encodeURIComponent(pointId)}`;

    const res = await fetch(url);

    if(!res.ok){
        throw new Error(`${pointId} の通信失敗: HTTP ${res.status}`);
    }

    const text = await res.text();

    try{
        return JSON.parse(text);
    }catch(e){
        console.error(`${pointId} のJSON解析失敗`, text);
        throw new Error(`${pointId} のJSON解析失敗`);
    }
}

function parseData(data, minTime){
    return data.map(d => ({
        x: new Date(d.recorded_at),
        temp: d.temperature !== null && d.temperature !== undefined ? Number(d.temperature) : null,
        hum: d.humidity !== null && d.humidity !== undefined ? Number(d.humidity) : null,
        co2: d.CO2 !== null && d.CO2 !== undefined ? Number(d.CO2) : null,
        solar: d.solar_radiation !== null && d.solar_radiation !== undefined ? Number(d.solar_radiation) : null,
        volt: d.voltage !== null && d.voltage !== undefined ? Number(d.voltage) : null
    })).filter(d => d.x >= minTime);
}

function createTempHumChart(canvasId, parsed, minTime, maxTime){
    return new Chart(document.getElementById(canvasId), {
        type: "line",
        data: {
            datasets: [
                {
                    label: "湿度 (%)",
                    data: parsed.map(d => ({x: d.x, y: d.hum})),
                    yAxisID: "yHum",
                    borderColor: HUM_COLOR,
                    backgroundColor: HUM_COLOR,
                    pointRadius: 1.5,
                    spanGaps: true
                },
                {
                    label: "温度 (℃)",
                    data: parsed.map(d => ({x: d.x, y: d.temp})),
                    yAxisID: "yTemp",
                    borderColor: TEMP_COLOR,
                    backgroundColor: TEMP_COLOR,
                    pointRadius: 1.5,
                    spanGaps: true
                }
            ]
        },
        options: {
            ...baseOptions(minTime, maxTime),
            scales: {
                ...baseOptions(minTime, maxTime).scales,
                yHum: {
                    position: "left",
                    min: 50,
                    max: 100,
                    ticks: {
                        stepSize: 10
                    }
                },
                yTemp: {
                    position: "right",
                    min: 10,
                    max: 60,
                    ticks: {
                        stepSize: 10
                    }
                }
            }
        }
    });
}

function findNearest(targetTime, data, limitMs){
    let nearest = null;
    let nearestDiff = limitMs;

    data.forEach(d => {
        const diff = Math.abs(d.x.getTime() - targetTime.getTime());
        if(diff <= nearestDiff){
            nearest = d;
            nearestDiff = diff;
        }
    });

    return nearest;
}

function createDiffData(p01, p02){
    const limitMs = 2 * 60 * 1000;
    const tempDiff = [];
    const humDiff = [];

    p01.forEach(d1 => {
        const d2 = findNearest(d1.x, p02, limitMs);

        if(!d2) return;

        if(d1.temp !== null && d2.temp !== null){
            tempDiff.push({
                x: d1.x,
                y: d1.temp - d2.temp
            });
        }

        if(d1.hum !== null && d2.hum !== null){
            humDiff.push({
                x: d1.x,
                y: d1.hum - d2.hum
            });
        }
    });

    return { tempDiff, humDiff };
}

function createDiffChart(canvasId, diffData, minTime, maxTime){
    return new Chart(document.getElementById(canvasId), {
        type: "line",
        data: {
            datasets: [
                {
                    label: "湿度差 P01−P02 (%)",
                    data: diffData.humDiff,
                    yAxisID: "yHumDiff",
                    borderColor: HUM_COLOR,
                    backgroundColor: HUM_COLOR,
                    pointRadius: 1.5,
                    spanGaps: true
                },
                {
                    label: "温度差 P01−P02 (℃)",
                    data: diffData.tempDiff,
                    yAxisID: "yTempDiff",
                    borderColor: TEMP_COLOR,
                    backgroundColor: TEMP_COLOR,
                    pointRadius: 1.5,
                    spanGaps: true
                }
            ]
        },
        options: {
            ...baseOptions(minTime, maxTime),
            scales: {
                ...baseOptions(minTime, maxTime).scales,
                yHumDiff: {
                    position: "left",
                    ticks: {
                        stepSize: 10
                    },
                    title: {
                        display: true,
                        text: "湿度差 %"
                    }
                },
                yTempDiff: {
                    position: "right",
                    ticks: {
                        stepSize: 10
                    },
                    title: {
                        display: true,
                        text: "温度差 ℃"
                    }
                }
            }
        }
    });
}

function createSingleChart(canvasId, parsed, key, label, unit, minTime, maxTime){
    return new Chart(document.getElementById(canvasId), {
        type: "line",
        data: {
            datasets: [
                {
                    label: label,
                    data: parsed.map(d => ({x: d.x, y: d[key]})),
                    pointRadius: 1.5,
                    spanGaps: true
                }
            ]
        },
        options: {
            ...baseOptions(minTime, maxTime),
            scales: {
                ...baseOptions(minTime, maxTime).scales,
                y: {
                    title: {
                        display: true,
                        text: unit
                    }
                }
            }
        }
    });
}

async function loadData(){

    const userId = document.getElementById("userId").value.trim();
    const msg = document.getElementById("message");

    if(!userId){
        msg.innerText = "user_id を入力してください";
        return;
    }

    msg.innerText = "読み込み中...";

    try{
        const now = new Date();
        const minTime = new Date(now.getTime() - 72 * 60 * 60 * 1000);

        const [dataP01, dataP02, dataP11, dataP21] = await Promise.all([
            fetchData(userId, "P01"),
            fetchData(userId, "P02"),
            fetchData(userId, "P11"),
            fetchData(userId, "P21")
        ]);

        const p01 = parseData(dataP01, minTime);
        const p02 = parseData(dataP02, minTime);
        const p11 = parseData(dataP11, minTime);
        const p21 = parseData(dataP21, minTime);

        getAllCharts().forEach(c => c.destroy());

        chartP01 = createTempHumChart("chartP01", p01, minTime, now);
        chartP02 = createTempHumChart("chartP02", p02, minTime, now);
        chartP11 = createTempHumChart("chartP11", p11, minTime, now);

        const diffData = createDiffData(p01, p02);
        chartDiff = createDiffChart("chartDiff", diffData, minTime, now);

        chartCO2 = createSingleChart("chartCO2", p21, "co2", "CO2 (ppm)", "ppm", minTime, now);
        chartSolar = createSingleChart("chartSolar", p11, "solar", "日射", "日射", minTime, now);
        chartVolt = createSingleChart("chartVolt", p11, "volt", "電圧", "V", minTime, now);

        msg.innerText = "";

    }catch(e){
        console.error(e);
        msg.innerText = e.message;
    }
}

function resetZoomAll(){
    getAllCharts().forEach(chart => {
        chart.resetZoom();
    });
}

</script>

</body>
</html>
