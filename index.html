function createMidnightLines(min, max){
    let lines = {};
    let d = new Date(min);
    d.setHours(0,0,0,0);

    while(d <= max){
        lines["line"+d.getTime()] = {
            type: 'line',
            xMin: d,
            xMax: d,
            borderColor: 'rgba(0,0,0,0.2)',
            borderWidth: 1
        };
        d.setDate(d.getDate()+1);
    }
    return lines;
}

}

function downloadCSV(){
    if(!lastData.length) return;

    let csv="datetime,temp,hum,vapor,remain\n";

    lastData.forEach(d=>{
        const t=Number(d.temperature);
        const h=Number(d.humidity);
        const v=calcVapor(t,h);
        const r=calcVapor(t,100)-v;

        csv+=`${d.recorded_at},${t},${h},${v.toFixed(1)},${r.toFixed(1)}\n`;
function resetZoom(){
    [tempChart,vaporChart,solarChart,voltChart].forEach(c=>{
        if(c) c.resetZoom();
    });

    const blob=new Blob([csv],{type:"text/csv"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="data.csv";
    a.click();
}

// 初期化
