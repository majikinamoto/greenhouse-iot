<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IoTダッシュボード</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom/dist/chartjs-plugin-zoom.min.js"></script>

<style>
body {
    font-family: sans-serif;
    margin: 10px;
}

.top {
    font-size: 18px;
    margin-bottom: 10px;
}

.box {
    margin-bottom: 20px;
}

.chart-container {
    width: 100%;
    max-width: 600px;
    height: 400px;
}

button {
    margin: 5px;
}
</style>
</head>

<body>

<div class="top">
    🌡 温度：<span id="nowTemp">-</span> ℃　
    💧 湿度：<span id="nowHum">-</span> %
</div>

<div class="box">
    開始：<input type="datetime-local" id="start">
    終了：<input type="datetime-local" id="end">
    <button onclick="downloadCSV()">CSVダウンロード</button>
</div>

<div class="box">
    <button onclick="resetZoom()">表示サイズをリセット</button>
</div>

<h3>温度・湿度</h3>
<div class="chart-container">
    <canvas id="combinedChart"></canvas>
</div>

<!-- 個別のグラフは削除
<h3>温度</h3>
<div class="chart-container">
    <canvas id="tempChart"></canvas>
</div>

<h3>湿度</h3>
<div class="chart-container">
    <canvas id="humChart"></canvas>
</div>
-->

<script>

let combinedChart;
let lastData = [];

function formatDate(d) {
    const pad = n => n.toString().padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ` +
           `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

async function loadData() {

    const res = await fetch('/get_data.php');
    if (!res.ok) {
        console.error('Fetch error:', res.status, await res.text());
        return;
    }
    const data = await res.json();
    console.log('Received data:', data);

    if (!Array.isArray(data) || data.length === 0) {
        console.warn('No data received');
        return;
    }

    lastData = data;

    const parsed = data.map(d => ({
        x: new Date(d.recorded_at),
        temp: Number(d.temperature),
        hum: Number(d.humidity)
    }));

    const now = new Date();
    const maxRange = new Date(now.getTime());
    const minRange = new Date(now.getTime() - 3 * 24 * 60 * 60 * 1000); // 3日

    const filtered = parsed.filter(d => d.x >= minRange && d.x <= maxRange);

    const tempData = filtered.map(d => ({ x: d.x, y: d.temp }));
    const humData = filtered.map(d => ({ x: d.x, y: d.hum }));

    // 最新値表示
    if (filtered.length > 0) {
        const last = filtered[filtered.length - 1];
        document.getElementById("nowTemp").innerText = last.temp;
        document.getElementById("nowHum").innerText = last.hum;
    }

    const options = {
        responsive: true,
        maintainAspectRatio: false,

        interaction: {
            mode: 'index',
            intersect: false
        },

        scales: {
            x: {
                type: 'time',
                time: {
                    unit: 'hour',
                    displayFormats: {
                        hour: 'MM/dd HH:mm'
                    }
                },
                ticks: {
                    maxTicksLimit: 12
                },
                min: minRange,
                max: maxRange
            }
        },

        plugins: {
            tooltip: {
                yAlign: 'bottom',
                xAlign: 'center'
            },
            zoom: {
                pan: {
                    enabled: true,
                    mode: 'x'
                },
                zoom: {
                    wheel: { enabled: true },
                    drag: { enabled: true },
                    mode: 'x'
                }
            }
        },

        elements: {
            line: {
                borderWidth: 1
            },
            point: {
                radius: 0
            }
        }
    };

    if (!combinedChart) {

        combinedChart = new Chart(document.getElementById("combinedChart"), {
            type: "line",
            data: {
                datasets: [
                    {
                        label: "湿度",
                        data: humData,
                        borderColor: "blue",
                        yAxisID: 'y'
                    },
                    {
                        label: "温度",
                        data: tempData,
                        borderColor: "red",
                        yAxisID: 'y1'
                    }
                ]
            },
            options: {
                ...options,
                scales: {
                    ...options.scales,
                    y: {
                        type: 'linear',
                        display: true,
                        position: 'left',
                        min: 40,
                        max: 100,
                        ticks: { stepSize: 10 },
                        title: {
                            display: true,
                            text: '湿度 (%)'
                        }
                    },
                    y1: {
                        type: 'linear',
                        display: true,
                        position: 'right',
                        min: 0,
                        max: 50,
                        ticks: { stepSize: 10 },
                        title: {
                            display: true,
                            text: '温度 (℃)'
                        },
                        grid: {
                            drawOnChartArea: false
                        }
                    }
                }
            }
        });

    } else {
        combinedChart.data.datasets[0].data = humData;
        combinedChart.data.datasets[1].data = tempData;

        combinedChart.update();
    }
}

// リセット
function resetZoom() {
    combinedChart.resetZoom();
}

// CSVダウンロード
function downloadCSV() {

    const start = new Date(document.getElementById("start").value);
    const end = new Date(document.getElementById("end").value);

    const filtered = lastData.filter(d => {
        const t = new Date(d.recorded_at);
        return t >= start && t <= end;
    });

    let csv = "datetime,temperature,humidity\n";

    filtered.forEach(d => {
        csv += `${d.recorded_at},${d.temperature},${d.humidity}\n`;
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = `greenhouse_${start.toISOString()}_to_${end.toISOString()}.csv`;
    a.click();
}

loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
