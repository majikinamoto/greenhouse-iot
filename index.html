<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>USUI Tech</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-crosshair"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.4.0"></script>

<style>
body { font-family: sans-serif; margin:20px; }
.box { margin:10px 0; }
button { margin:5px; }

.grid {
    display:grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap:20px;
    align-items:start;
}

.chart-container {
    width:66%;
    min-width:320px;
    height:350px;
    margin-bottom:25px;
}

.status-container {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin:10px 0;
}

.status-box {
    border:1px solid #ccc;
    padding:10px;
    border-radius:8px;
    background:rgba(0,0,0,0.03);
}

@media (max-width: 1100px) {
    .grid { grid-template-columns: 1fr; }
    .chart-container { width:100%; }
}
</style>
</head>

<body>

<div class="box">
user_id：
<input type="text" id="userId" placeholder="例: T0001">
<button onclick="loadData()">表示</button>
<button onclick="resetZoom()">ズームリセット</button>
</div>

<div id="message" style="color:#666; margin:10px;"></div>

<div class="status-container">
<div class="status-box">現在温度（P01）：<span id="tempNow">-</span>℃</div>
<div class="status-box">現在湿度（P01）：<span id="humNow">-</span>%</div>
<div class="status-box">前日最高（P01）：<span id="yMax">-</span>℃</div>
<div class="status-box">前日最低（P01）：<span id="yMin">-</span>℃</div>
</div>

<h3>温度・湿度</h3>

<div class="grid">

    <div>
        <h4>P01</h4>
        <div class="chart-container"><canvas id="tempChartP01"></canvas></div>

        <h4>P11</h4>
        <div class="chart-container"><canvas id="tempChartP11"></canvas></div>

        <h4>日射（P11）</h4>
        <div class="chart-container"><canvas id="solarChart"></canvas></div>

        <h4>電圧（P11）</h4>
        <div class="chart-container"><canvas id="voltChart"></canvas></div>
    </div>

    <div>
        <h4>P02</h4>
        <div class="chart-container"><canvas id="tempChartP02"></canvas></div>
    </div>

    <div>
        <h4>温度差・湿度差（P01−P02）</h4>
        <div class="chart-container"><canvas id="diffChart"></canvas></div>
    </div>

</div>

<script>

let tempChartP01, tempChartP02, tempChartP11;
let diffChart, solarChart, voltChart;

let allCharts = [];
let syncingZoom = false;

window.addEventListener("DOMContentLoaded", ()=>{
    const savedUserId = localStorage.getItem("usui_user_id");
    if(savedUserId){
        document.getElementById("userId").value = savedUserId;
    }
});

function createMidnightLines(minTime, maxTime){

    const lines = {};
    let d = new Date(minTime);
    d.setHours(0,0,0,0);

    while(d <= maxTime){
        const key = "midnight_" + d.getTime();

        lines[key] = {
            type:'line',
            xMin: d,
            xMax: d,
            borderColor:'rgba(0,0,0,0.2)',
            borderWidth:1
        };

        d = new Date(d.getTime() + 24*60*60*1000);
    }

    return lines;
}

function baseOptions(minTime,maxTime){
    return {
        parsing:false,
        responsive:true,
        maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
            zoom:{
                zoom:{
                    wheel:{enabled:true},
                    pinch:{enabled:true},
                    drag:{enabled:true},
                    mode:'x',
                    onZoomComplete({chart}){ syncZoom(chart); }
                },
                pan:{
                    enabled:true,
                    mode:'x',
                    onPanComplete({chart}){ syncZoom(chart); }
                }
            },
            crosshair:{
                line:{color:'#000',width:1},
                sync:{ enabled:true, group:1 }
            },
            annotation:{
                annotations: createMidnightLines(minTime,maxTime)
            }
        },
        scales:{
            x:{
                type:"time",
                min:minTime,
                max:maxTime,
                time:{
                    tooltipFormat:"HH:mm",
                    displayFormats:{
                        minute:"HH:mm",
                        hour:"HH:mm"
                    }
                }
            }
        }
    };
}

function syncZoom(sourceChart){

    if(syncingZoom) return;
    syncingZoom = true;

    const xScale = sourceChart.scales.x;

    allCharts.forEach(chart=>{
        if(chart && chart !== sourceChart){
            chart.options.scales.x.min = xScale.min;
            chart.options.scales.x.max = xScale.max;
            chart.update("none");
        }
    });

    syncingZoom = false;
}

async function fetchDataSafe(userId, pointId){

    try{
        const url = `get_data.php?user_id=${encodeURIComponent(userId)}&point_id=${encodeURIComponent(pointId)}`;
        const res = await fetch(url);

        if(!res.ok){
            return {
                pointId: pointId,
                data: [],
                error: `${pointId}：HTTPエラー ${res.status}`
            };
        }

        const text = await res.text();

        let data;
        try{
            data = JSON.parse(text);
        }catch(e){
            return {
                pointId: pointId,
                data: [],
                error: `${pointId}：JSON形式ではありません`
            };
        }

        if(!Array.isArray(data)){
            return {
                pointId: pointId,
                data: [],
                error: `${pointId}：配列データではありません`
            };
        }

        return {
            pointId: pointId,
            data: data,
            error: null
        };

    }catch(e){
        return {
            pointId: pointId,
            data: [],
            error: `${pointId}：通信エラー`
        };
    }
}

function parseData(data, minTime){

    return data.map(d=>({
        x:new Date(d.recorded_at),
        temp:d.temperature !== null && d.temperature !== undefined ? Number(d.temperature) : null,
        hum:d.humidity !== null && d.humidity !== undefined ? Number(d.humidity) : null,
        solar:d.solar_radiation !== null && d.solar_radiation !== undefined ? Number(d.solar_radiation) : null,
        volt:d.voltage !== null && d.voltage !== undefined ? Number(d.voltage) : null
    })).filter(d=>
        d.x instanceof Date &&
        !isNaN(d.x) &&
        d.x >= minTime
    );
}

function createTempHumChart(canvasId, parsed, minTime, maxTime){

    return new Chart(document.getElementById(canvasId),{
        type:"line",
        data:{
            datasets:[
                {
                    label:"湿度 (%)",
                    data:parsed
                        .filter(d=>d.hum !== null && !isNaN(d.hum))
                        .map(d=>({x:d.x,y:d.hum})),
                    yAxisID:"yHum"
                },
                {
                    label:"温度 (℃)",
                    data:parsed
                        .filter(d=>d.temp !== null && !isNaN(d.temp))
                        .map(d=>({x:d.x,y:d.temp})),
                    yAxisID:"yTemp"
                }
            ]
        },
        options:{
            ...baseOptions(minTime,maxTime),
            scales:{
                ...baseOptions(minTime,maxTime).scales,
                yHum:{ position:"left", min:50, max:100, ticks:{stepSize:10}},
                yTemp:{ position:"right", min:10, max:60, ticks:{stepSize:10}}
            }
        }
    });
}

function createDiffChart(canvasId, p01, p02, minTime, maxTime){

    const p02Map = new Map(
        p02.map(d=>[
            Math.floor(d.x.getTime()/60000),
            {
                temp:d.temp,
                hum:d.hum
            }
        ])
    );

    const tempDiffData = [];
    const humDiffData = [];

    p01.forEach(d=>{
        const key = Math.floor(d.x.getTime()/60000);
        const p02Data = p02Map.get(key);

        if(!p02Data) return;

        if(d.temp !== null && p02Data.temp !== null && !isNaN(d.temp) && !isNaN(p02Data.temp)){
            tempDiffData.push({
                x:d.x,
                y:d.temp - p02Data.temp
            });
        }

        if(d.hum !== null && p02Data.hum !== null && !isNaN(d.hum) && !isNaN(p02Data.hum)){
            humDiffData.push({
                x:d.x,
                y:d.hum - p02Data.hum
            });
        }
    });

    return new Chart(document.getElementById(canvasId),{
        type:"line",
        data:{
            datasets:[
                {
                    label:"温度差 P01−P02 (℃)",
                    data:tempDiffData
                },
                {
                    label:"湿度差 P01−P02 (%)",
                    data:humDiffData
                }
            ]
        },
        options:{
            ...baseOptions(minTime,maxTime),
            scales:{
                ...baseOptions(minTime,maxTime).scales,
                y:{
                    min:-3,
                    max:3,
                    ticks:{stepSize:1},
                    title:{display:true,text:"差"}
                }
            }
        }
    });
}

function createSingleChart(canvasId, parsed, key, label, unit, minTime, maxTime){

    return new Chart(document.getElementById(canvasId),{
        type:"line",
        data:{
            datasets:[{
                label:label,
                data:parsed
                    .filter(d=>d[key] !== null && !isNaN(d[key]))
                    .map(d=>({x:d.x,y:d[key]}))
            }]
        },
        options:{ ...baseOptions(minTime,maxTime) }
    });
}

async function loadData(){

    const userId = document.getElementById("userId").value.trim();
    const msg = document.getElementById("message");

    if(!userId){
        msg.innerText = "user_id を入力してください";
        return;
    }

    localStorage.setItem("usui_user_id", userId);

    msg.innerText = "読み込み中...";

    document.getElementById("tempNow").innerText = "-";
    document.getElementById("humNow").innerText = "-";
    document.getElementById("yMax").innerText = "-";
    document.getElementById("yMin").innerText = "-";

    destroyCharts();

    const now = new Date();
    const minTime = new Date(now.getTime() - 72*60*60*1000);

    const results = await Promise.all([
        fetchDataSafe(userId,"P01"),
        fetchDataSafe(userId,"P02"),
        fetchDataSafe(userId,"P11")
    ]);

    const resultP01 = results.find(r=>r.pointId === "P01");
    const resultP02 = results.find(r=>r.pointId === "P02");
    const resultP11 = results.find(r=>r.pointId === "P11");

    const p01 = parseData(resultP01.data, minTime);
    const p02 = parseData(resultP02.data, minTime);
    const p11 = parseData(resultP11.data, minTime);

    const errors = results
        .filter(r=>r.error)
        .map(r=>r.error);

    if(!p01.length && !p02.length && !p11.length){
        msg.innerText = "No data（72時間内データなし）" + (errors.length ? " / " + errors.join(" / ") : "");
        return;
    }

    if(p01.length){
        const validP01 = p01.filter(d=>
            d.temp !== null &&
            d.hum !== null &&
            !isNaN(d.temp) &&
            !isNaN(d.hum)
        );

        if(validP01.length){
            const last = validP01[validP01.length - 1];

            document.getElementById("tempNow").innerText = last.temp.toFixed(1);
            document.getElementById("humNow").innerText = last.hum.toFixed(1);

            const yStart = new Date();
            yStart.setDate(yStart.getDate() - 1);
            yStart.setHours(0,0,0,0);

            const yEnd = new Date(yStart);
            yEnd.setHours(23,59,59,999);

            const yData = validP01.filter(d=>d.x>=yStart && d.x<=yEnd);

            if(yData.length){
                const temps = yData.map(d=>d.temp);
                document.getElementById("yMax").innerText = Math.max(...temps).toFixed(1);
                document.getElementById("yMin").innerText = Math.min(...temps).toFixed(1);
            }
        }
    }

    tempChartP01 = createTempHumChart("tempChartP01", p01, minTime, now);
    tempChartP02 = createTempHumChart("tempChartP02", p02, minTime, now);
    tempChartP11 = createTempHumChart("tempChartP11", p11, minTime, now);

    diffChart = createDiffChart("diffChart", p01, p02, minTime, now);

    solarChart = createSingleChart("solarChart", p11, "solar", "日射", "日射", minTime, now);
    voltChart = createSingleChart("voltChart", p11, "volt", "電圧", "V", minTime, now);

    allCharts = [
        tempChartP01,
        tempChartP02,
        tempChartP11,
        diffChart,
        solarChart,
        voltChart
    ];

    if(errors.length){
        msg.innerText = errors.join(" / ");
    }else{
        msg.innerText = "";
    }
}

function destroyCharts(){
    allCharts.forEach(c=>{ if(c) c.destroy(); });
    allCharts = [];
}

function resetZoom(){
    allCharts.forEach(c=>{ if(c) c.resetZoom(); });
}

</script>

</body>
</html>
