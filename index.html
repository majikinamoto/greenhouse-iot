<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>USUI Tech</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-crosshair"></script>

<style>
body { font-family: sans-serif; margin:20px; }
.chart-container { width:100%; max-width:950px; height:420px; margin:20px auto; }
.box { margin:10px 0; }
.status-container { display:flex; gap:10px; flex-wrap:wrap; }
.status-box { border:1px solid #ccc; padding:10px; border-radius:8px; background:rgba(0,0,0,0.03); }
button { margin:5px; }
</style>
</head>

<body>

<h2>🌱 USUI Tech</h2>

<div class="box">
ハウスID：
<input type="number" id="userId" value="2">
<button onclick="loadData()">表示</button>
<button onclick="resetZoom()">ズームリセット</button>
</div>

<div class="status-container">
<div class="status-box">温度：<span id="nowTemp">-</span>℃</div>
<div class="status-box">湿度：<span id="nowHum">-</span>%</div>
<div class="status-box">水蒸気量：<span id="nowVapor">-</span> g/m³</div>
<div class="status-box">飽差：<span id="nowRemain">-</span> g/m³</div>
<div class="status-box">前日最高：<span id="yMax">-</span>℃</div>
<div class="status-box">前日最低：<span id="yMin">-</span>℃</div>
</div>

<h3>温度・湿度</h3>
<div class="chart-container"><canvas id="tempChart"></canvas></div>

<h3>水蒸気量・飽差</h3>
<div class="chart-container"><canvas id="vaporChart"></canvas></div>

<h3>日射</h3>
<div class="chart-container"><canvas id="solarChart"></canvas></div>

<h3>電圧</h3>
<div class="chart-container"><canvas id="voltChart"></canvas></div>

<script>

let tempChart, vaporChart, solarChart, voltChart;
let lastData = [];

function calcVapor(temp, hum){
    const es = 6.1078 * Math.exp((17.269 * temp)/(temp+237.3));
    const ea = es*(hum/100);
    return 216.7*(ea/(temp+273.15));
}

// ===== 日付線（0時ライン）生成 =====
function createMidnightLines(min, max){
    let lines = {};
    let d = new Date(min);
    d.setHours(0,0,0,0);

    while(d <= max){
        lines["line"+d.getTime()] = {
            type: 'line',
            xMin: d,
            xMax: d,
            borderColor: 'rgba(0,0,0,0.2)',
            borderWidth: 1
        };
        d.setDate(d.getDate()+1);
    }
    return lines;
}

function baseOptions(minTime,maxTime){
    return {
        parsing:false,
        responsive:true,
        interaction:{mode:'index',intersect:false},
        plugins:{
            zoom:{
                zoom:{wheel:{enabled:true},pinch:{enabled:true},mode:'x'},
                pan:{enabled:true,mode:'x'}
            },
            crosshair:{
                line:{color:'#000',width:1},
                sync:{enabled:false}
            }
        },
        scales:{
            x:{
                type:"time",
                min:minTime,
                max:maxTime
            }
        }
    };
}

async function loadData(){

    const userId = document.getElementById("userId").value;
    localStorage.setItem("userId", userId);

    const res = await fetch(`/get_data.php?user_id=${userId}`);
    const data = await res.json();
    if(!data.length) return;

    lastData = data;

    const now = new Date();
    const minTime = new Date(now.getTime() - 72*60*60*1000);

    const parsed = data.map(d=>({
        x:new Date(d.recorded_at),
        temp:Number(d.temperature),
        hum:Number(d.humidity),
        solar:Number(d.solar_radiation),
        volt:Number(d.voltage)
    })).filter(d=>d.x>=minTime);

    const last = parsed[parsed.length-1];

    document.getElementById("nowTemp").innerText = last.temp.toFixed(1);
    document.getElementById("nowHum").innerText = last.hum.toFixed(1);

    const vapor = calcVapor(last.temp,last.hum);
    const remain = calcVapor(last.temp,100)-vapor;

    document.getElementById("nowVapor").innerText = vapor.toFixed(1);
    document.getElementById("nowRemain").innerText = remain.toFixed(1);

    // ===== 前日 =====
    const yStart = new Date();
    yStart.setDate(yStart.getDate()-1);
    yStart.setHours(0,0,0,0);
    const yEnd = new Date(yStart); yEnd.setHours(23,59,59,999);

    const yData = parsed.filter(d=>d.x>=yStart && d.x<=yEnd);

    if(yData.length){
        const temps = yData.map(d=>d.temp);
        document.getElementById("yMax").innerText = Math.max(...temps).toFixed(1);
        document.getElementById("yMin").innerText = Math.min(...temps).toFixed(1);
    }

    const midnightLines = createMidnightLines(minTime, now);

    // ===== 温湿度 =====
    if(tempChart) tempChart.destroy();
    tempChart = new Chart(document.getElementById("tempChart"),{
        type:"line",
        data:{
            datasets:[
                {
                    label:"湿度 (%)",
                    data:parsed.map(d=>({x:d.x,y:d.hum})),
                    yAxisID:"yHum",
                    backgroundColor:"rgba(0,0,255,0.1)"
                },
                {
                    label:"温度 (℃)",
                    data:parsed.map(d=>({x:d.x,y:d.temp})),
                    yAxisID:"yTemp",
                    backgroundColor:"rgba(255,0,0,0.1)"
                }
            ]
        },
        options:{
            ...baseOptions(minTime,now),
            scales:{
                ...baseOptions(minTime,now).scales,
                yHum:{min:50,max:100,position:"left",title:{display:true,text:"湿度 (%)"}},
                yTemp:{min:10,max:60,position:"right",title:{display:true,text:"温度 (℃)"}}
            },
            plugins:{
                ...baseOptions(minTime,now).plugins,
                annotation:{annotations:midnightLines}
            }
        }
    });

    // ===== vapor =====
    if(vaporChart) vaporChart.destroy();
    vaporChart = new Chart(document.getElementById("vaporChart"),{
        type:"line",
        data:{
            datasets:[
                {
                    label:"水蒸気量",
                    data:parsed.map(d=>({x:d.x,y:calcVapor(d.temp,d.hum)})),
                    yAxisID:"yV"
                },
                {
                    label:"飽差",
                    data:parsed.map(d=>({x:d.x,y:calcVapor(d.temp,100)-calcVapor(d.temp,d.hum)})),
                    yAxisID:"yR"
                }
            ]
        },
        options:{
            ...baseOptions(minTime,now),
            scales:{
                ...baseOptions(minTime,now).scales,
                yV:{position:"left",title:{display:true,text:"g/m³"}},
                yR:{position:"right",title:{display:true,text:"g/m³"}}
            },
            plugins:{
                ...baseOptions(minTime,now).plugins,
                annotation:{annotations:midnightLines}
            }
        }
    });

    // ===== 日射 =====
    if(solarChart) solarChart.destroy();
    solarChart = new Chart(document.getElementById("solarChart"),{
        type:"line",
        data:{
            datasets:[{
                label:"日射",
                data:parsed.map(d=>({x:d.x,y:d.solar}))
            }]
        },
        options:{...baseOptions(minTime,now)}
    });

    // ===== 電圧 =====
    if(voltChart) voltChart.destroy();
    voltChart = new Chart(document.getElementById("voltChart"),{
        type:"line",
        data:{
            datasets:[{
                label:"電圧",
                data:parsed.map(d=>({x:d.x,y:d.volt}))
            }]
        },
        options:{
            ...baseOptions(minTime,now),
            scales:{
                ...baseOptions(minTime,now).scales,
                y:{min:11,max:15}
            }
        }
    });
}

function resetZoom(){
    [tempChart,vaporChart,solarChart,voltChart].forEach(c=>{
        if(c) c.resetZoom();
    });
}

window.onload=()=>{
    const saved=localStorage.getItem("userId");
    if(saved) document.getElementById("userId").value=saved;
    loadData();
};

setInterval(loadData,60000);

</script>

</body>
</html>
