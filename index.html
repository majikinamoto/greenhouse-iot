<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>USUI Tech</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-crosshair"></script>

<style>
body { font-family: sans-serif; margin:20px; }
.chart-container { width:100%; max-width:950px; height:420px; margin:20px auto; }
.box { margin:10px 0; }
.status-container { display:flex; gap:10px; flex-wrap:wrap; }
.status-box { border:1px solid #ccc; padding:10px; border-radius:8px; background:rgba(0,0,0,0.03); }
button { margin:5px; }
</style>
</head>

<body>

<div class="box">
user_id：
<input type="text" id="userId" value="T0001">

point_id：
<select id="pointId">
  <option value="P01">P01</option>
  <option value="P02">P02</option>
</select>

<button onclick="loadData()">表示</button>
<button onclick="resetZoom()">ズームリセット</button>
</div>

<div class="status-container">
<div class="status-box">現在温度：<span id="tempNow">-</span>℃</div>
<div class="status-box">現在湿度：<span id="humNow">-</span>%</div>
<div class="status-box">前日最高：<span id="yMax">-</span>℃</div>
<div class="status-box">前日最低：<span id="yMin">-</span>℃</div>
</div>

<h3>温度・湿度</h3>
<div class="chart-container"><canvas id="tempChart"></canvas></div>

<h3>水蒸気量・飽差</h3>
<div class="chart-container"><canvas id="vaporChart"></canvas></div>

<h3>日射</h3>
<div class="chart-container"><canvas id="solarChart"></canvas></div>

<h3>電圧</h3>
<div class="chart-container"><canvas id="voltChart"></canvas></div>

<script>

let tempChart, vaporChart, solarChart, voltChart;
let lastData = [];

function calcVapor(temp, hum){
    const es = 6.1078 * Math.pow(10, (7.5*temp)/(237.3+temp));
    const ea = es * hum/100;
    return 216.7*(ea/(temp+273.15));
}

function baseOptions(minTime,maxTime){
    return {
        parsing:false,
        responsive:true,
        interaction:{mode:'index',intersect:false},
        plugins:{
            zoom:{
                zoom:{wheel:{enabled:true},pinch:{enabled:true},mode:'x'},
                pan:{enabled:true,mode:'x'}
            },
            crosshair:{
                line:{color:'#000',width:1},
                sync:{enabled:false}
            }
        },
        scales:{
            x:{
                type:"time",
                min:minTime,
                max:maxTime
            }
        }
    };
}

async function loadData(){

    const userId = document.getElementById("userId").value;
    const pointId = document.getElementById("pointId").value;

    const res = await fetch(`get_data.php?user_id=${userId}&point_id=${pointId}`);
    const data = await res.json();

    lastData = data;

    const now = new Date();
    const minTime = new Date(now.getTime() - 72*60*60*1000);

    const parsed = data.map(d=>({
        x:new Date(d.recorded_at),
        temp:Number(d.temperature),
        hum:Number(d.humidity),
        solar:Number(d.solar_radiation),
        volt:Number(d.voltage)
    })).filter(d=>d.x>=minTime);

    if(parsed.length === 0) return;

    const last = parsed[parsed.length-1];

    document.getElementById("tempNow").innerText = last.temp.toFixed(1);
    document.getElementById("humNow").innerText = last.hum.toFixed(1);

    const yStart = new Date();
    yStart.setDate(yStart.getDate()-1);
    yStart.setHours(0,0,0,0);

    const yEnd = new Date(yStart);
    yEnd.setHours(23,59,59,999);

    const yData = parsed.filter(d=>d.x>=yStart && d.x<=yEnd);

    if(yData.length){
        const temps = yData.map(d=>d.temp);
        document.getElementById("yMax").innerText = Math.max(...temps).toFixed(1);
        document.getElementById("yMin").innerText = Math.min(...temps).toFixed(1);
    }

    // ===== 温湿度 =====
    if(tempChart) tempChart.destroy();
    tempChart = new Chart(document.getElementById("tempChart"),{
        type:"line",
        data:{
            datasets:[
                {
                    label:"湿度 (%)",
                    data:parsed.map(d=>({x:d.x,y:d.hum})),
                    yAxisID:"yHum"
                },
                {
                    label:"温度 (℃)",
                    data:parsed.map(d=>({x:d.x,y:d.temp})),
                    yAxisID:"yTemp"
                }
            ]
        },
        options:{
            ...baseOptions(minTime,now),
            scales:{
                ...baseOptions(minTime,now).scales,
                yHum:{position:"left",min:50,max:100},
                yTemp:{position:"right",min:10,max:60}
            }
        }
    });

    // ===== vapor =====
    if(vaporChart) vaporChart.destroy();
    vaporChart = new Chart(document.getElementById("vaporChart"),{
        type:"line",
        data:{
            datasets:[
                {
                    label:"水蒸気量",
                    data:parsed.map(d=>({x:d.x,y:calcVapor(d.temp,d.hum)}))
                },
                {
                    label:"飽差",
                    data:parsed.map(d=>({x:d.x,y:calcVapor(d.temp,100)-calcVapor(d.temp,d.hum)}))
                }
            ]
        },
        options:{...baseOptions(minTime,now)}
    });

    // ===== 日射 =====
    if(solarChart) solarChart.destroy();
    solarChart = new Chart(document.getElementById("solarChart"),{
        type:"line",
        data:{
            datasets:[{
                label:"日射",
                data:parsed.map(d=>({x:d.x,y:d.solar}))
            }]
        },
        options:{...baseOptions(minTime,now)}
    });

    // ===== 電圧 =====
    if(voltChart) voltChart.destroy();
    voltChart = new Chart(document.getElementById("voltChart"),{
        type:"line",
        data:{
            datasets:[{
                label:"電圧",
                data:parsed.map(d=>({x:d.x,y:d.volt}))
            }]
        },
        options:{...baseOptions(minTime,now)}
    });
}

function resetZoom(){
    [tempChart,vaporChart,solarChart,voltChart].forEach(c=>{
        if(c) c.resetZoom();
    });
}

// 初期化
window.onload=()=>{
    loadData();
};

// 60秒更新
setInterval(loadData,60000);

</script>

</body>
</html>
