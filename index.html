<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IoTダッシュボード</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>

<!-- Crosshairプラグイン -->
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-crosshair"></script>

<!-- Chart.js annotation plugin -->
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.4.0/dist/chartjs-plugin-annotation.min.js"></script>

<style>
/* Google Fonts */
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap');

* {
    box-sizing: border-box;
}

body {
    font-family: 'Noto Sans JP', sans-serif;
    margin: 0;
    padding: 20px;
    min-height: 100vh;
    background: 
        radial-gradient(ellipse at top, #1a1a2e 0%, transparent 50%),
        radial-gradient(ellipse at bottom right, #16213e 0%, transparent 50%),
        linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 50%, #0d0d15 100%);
    background-attachment: fixed;
    color: #fff;
}

/* タイトル */
h1 {
    font-family: 'Orbitron', sans-serif;
    text-align: center;
    font-size: 2.5em;
    margin: 0 0 30px 0;
    background: linear-gradient(90deg, #00d4ff, #ff00ff, #00d4ff);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: gradient-shift 3s linear infinite;
    text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
    letter-spacing: 4px;
}

@keyframes gradient-shift {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
}

h3 {
    font-family: 'Orbitron', sans-serif;
    color: #00d4ff;
    font-size: 1.3em;
    margin: 30px 0 15px 0;
    padding-left: 15px;
    border-left: 4px solid #00d4ff;
    text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
}

/* ステータスコンテナ */
.status-container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    margin-bottom: 30px;
}

/* ステータスカード - ガラスモーフィズム */
.status-box {
    position: relative;
    display: flex;
    align-items: center;
    font-size: 1.1em;
    font-weight: bold;
    border-radius: 20px;
    padding: 20px 28px;
    min-width: 200px;
    justify-content: center;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s ease;
    overflow: hidden;
}

.status-box::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transition: left 0.5s ease;
}

.status-box:hover::before {
    left: 100%;
}

.status-box:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
}

/* 温度カード */
.status-box.temp {
    background: linear-gradient(135deg, rgba(255, 70, 70, 0.2) 0%, rgba(180, 30, 30, 0.3) 100%);
    border: 1px solid rgba(255, 70, 70, 0.4);
    box-shadow: 0 0 30px rgba(255, 70, 70, 0.2), inset 0 0 30px rgba(255, 70, 70, 0.1);
}

.status-box.temp .icon {
    color: #ff6b6b;
    text-shadow: 0 0 20px #ff6b6b;
}

/* 湿度カード */
.status-box.hum {
    background: linear-gradient(135deg, rgba(70, 130, 255, 0.2) 0%, rgba(30, 60, 180, 0.3) 100%);
    border: 1px solid rgba(70, 130, 255, 0.4);
    box-shadow: 0 0 30px rgba(70, 130, 255, 0.2), inset 0 0 30px rgba(70, 130, 255, 0.1);
}

.status-box.hum .icon {
    color: #6b9fff;
    text-shadow: 0 0 20px #6b9fff;
}

/* 最高温度カード */
.status-box.max {
    background: linear-gradient(135deg, rgba(255, 100, 50, 0.2) 0%, rgba(180, 50, 20, 0.3) 100%);
    border: 1px solid rgba(255, 100, 50, 0.4);
    box-shadow: 0 0 30px rgba(255, 100, 50, 0.2), inset 0 0 30px rgba(255, 100, 50, 0.1);
}

.status-box.max .icon {
    color: #ff9646;
    text-shadow: 0 0 20px #ff9646;
}

/* 最低温度カード */
.status-box.min {
    background: linear-gradient(135deg, rgba(100, 180, 255, 0.2) 0%, rgba(50, 100, 180, 0.3) 100%);
    border: 1px solid rgba(100, 180, 255, 0.4);
    box-shadow: 0 0 30px rgba(100, 180, 255, 0.2), inset 0 0 30px rgba(100, 180, 255, 0.1);
}

.status-box.min .icon {
    color: #64b4ff;
    text-shadow: 0 0 20px #64b4ff;
}

.status-box .icon {
    font-size: 1.8em;
    margin-right: 15px;
    animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
}

.status-box .label {
    color: rgba(255, 255, 255, 0.7);
    font-size: 0.85em;
    margin-right: 8px;
}

.status-box .value {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.6em;
    font-weight: 700;
    margin: 0 8px;
    text-shadow: 0 0 15px currentColor;
}

.status-box.temp .value { color: #ff6b6b; }
.status-box.hum .value { color: #6b9fff; }
.status-box.max .value { color: #ff9646; }
.status-box.min .value { color: #64b4ff; }

.status-box .unit {
    font-size: 0.9em;
    color: rgba(255, 255, 255, 0.6);
}

/* コントロールボックス */
.box {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
}

.box label {
    color: rgba(255, 255, 255, 0.7);
    margin-right: 10px;
}

.box input[type="datetime-local"] {
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(0, 212, 255, 0.3);
    border-radius: 8px;
    padding: 10px 15px;
    color: #fff;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
    transition: all 0.3s ease;
}

.box input[type="datetime-local"]:focus {
    border-color: #00d4ff;
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
}

/* ボタン */
button {
    font-family: 'Orbitron', sans-serif;
    background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    color: #000;
    font-weight: 700;
    font-size: 0.9em;
    cursor: pointer;
    margin: 5px;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
}

button:active {
    transform: translateY(0);
}

/* チャートコンテナ */
.chart-container {
    width: 100%;
    max-width: 1000px;
    height: 450px;
    margin: 0 auto;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 20px;
    padding: 20px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
}

/* フッター */
footer {
    text-align: center;
    margin-top: 40px;
    padding: 20px;
    color: rgba(255, 255, 255, 0.4);
    font-size: 0.8em;
}

/* レスポンシブ */
@media (max-width: 768px) {
    body {
        padding: 15px;
    }
    
    h1 {
        font-size: 1.8em;
    }
    
    .status-container {
        flex-direction: column;
        align-items: center;
    }
    
    .status-box {
        width: 100%;
        max-width: 300px;
    }
    
    .chart-container {
        height: 350px;
        padding: 10px;
    }
    
    .box {
        padding: 15px;
    }
    
    .box input[type="datetime-local"] {
        width: 100%;
        margin-bottom: 10px;
    }
    
    button {
        width: 100%;
        max-width: 300px;
    }
}
</style>
</head>

<body>

<h1>🌱 Greenhouse IoT Dashboard</h1>

<div class="status-container">
    <div class="status-box temp">
        <span class="icon">🌡</span>
        <span class="label">現在温度</span>
        <span class="value" id="nowTemp">-</span>
        <span class="unit">℃</span>
    </div>
    <div class="status-box hum">
        <span class="icon">💧</span>
        <span class="label">現在湿度</span>
        <span class="value" id="nowHum">-</span>
        <span class="unit">%</span>
    </div>
    <div class="status-box max">
        <span class="icon">▲</span>
        <span class="label">前日最高</span>
        <span class="value" id="yesterdayMax">-</span>
        <span class="unit">℃</span>
    </div>
    <div class="status-box min">
        <span class="icon">▼</span>
        <span class="label">前日最低</span>
        <span class="value" id="yesterdayMin">-</span>
        <span class="unit">℃</span>
    </div>
</div>
</div>

<div class="box">
    <span style="color: rgba(255,255,255,0.7); margin-right: 10px;">開始：</span>
    <input type="datetime-local" id="start">
    <span style="color: rgba(255,255,255,0.7); margin: 0 10px;">終了：</span>
    <input type="datetime-local" id="end">
    <button onclick="downloadCSV()">CSVダウンロード</button>
</div>

<div class="box" style="text-align: center;">
    <button onclick="resetZoom()">表示リセット</button>
</div>

<h3>📊 温度・湿度推移</h3>
<div class="chart-container">
    <canvas id="tempChart"></canvas>
</div>

<script>

let tempChart;
let lastData = [];

function formatDate(d) {
    const pad = n => n.toString().padStart(2,'0');
    // 24時間表記
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

async function loadData() {

    const res = await fetch('/get_data.php');
    if (!res.ok) {
        console.error('Fetch error:', res.status, await res.text());
        return;
    }
    const data = await res.json();
    console.log('Received data:', data);

    if (!Array.isArray(data) || data.length === 0) {
        console.warn('No data received');
        return;
    }

    lastData = data;

    const parsed = data.map(d => ({
        x: new Date(d.recorded_at),
        temp: Number(d.temperature),
        hum: Number(d.humidity)
    }));

    const now = new Date();
    const maxRange = new Date(now.getTime());
    const minRange = new Date(now.getTime() - 72 * 60 * 60 * 1000); // 72時間

    const filtered = parsed.filter(d => d.x >= minRange && d.x <= maxRange);

    const tempData = filtered.map(d => ({ x: d.x, y: d.temp }));
    const humData = filtered.map(d => ({ x: d.x, y: d.hum }));

    // 最新値表示
    if (filtered.length > 0) {
        const last = filtered[filtered.length - 1];
        document.getElementById("nowTemp").innerText = last.temp;
        document.getElementById("nowHum").innerText = last.hum;
    }

    // 前日の最高・最低温度を計算
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    yesterday.setHours(0, 0, 0, 0);
    const yesterdayEnd = new Date(yesterday);
    yesterdayEnd.setHours(23, 59, 59, 999);

    const yesterdayData = parsed.filter(d => d.x >= yesterday && d.x <= yesterdayEnd);
    if (yesterdayData.length > 0) {
        const temps = yesterdayData.map(d => d.temp);
        const maxTemp = Math.max(...temps);
        const minTemp = Math.min(...temps);
        document.getElementById("yesterdayMax").innerText = maxTemp;
        document.getElementById("yesterdayMin").innerText = minTemp;
    }

    const options = {
        responsive: true,
        maintainAspectRatio: false,
        parsing: false,

        interaction: {
            mode: 'index',
            intersect: false
        },

        scales: {
  x: {
    type: 'time',
    time: {
        unit: 'hour',
        displayFormats: {
            hour: 'MM/dd HH',
            day: 'MM/dd',
            minute: 'MM/dd HH',
            second: 'MM/dd HH'
        }
    },
    ticks: {
        maxTicksLimit: 12,
        color: 'rgba(255,255,255,0.7)',
        font: { family: 'Orbitron', size: 11 },
        callback: function(value, index, ticks) {
            const date = new Date(value);
            const mm = (date.getMonth() + 1).toString().padStart(2, '0');
            const dd = date.getDate().toString().padStart(2, '0');
            const hh = date.getHours().toString().padStart(2, '0');
            return `${mm}/${dd} ${hh}時`;
        }
    },
    min: minRange,
    max: maxRange,
    grid: {
        color: 'rgba(255,255,255,0.1)',
        borderColor: 'rgba(255,255,255,0.2)'
    }
},
            y: {
                min: 0,
                ticks: {
                    stepSize: 10,
                    color: 'rgba(255,255,255,0.7)'
                }
            }
        },

        plugins: {
            tooltip: {
                backgroundColor: 'rgba(0, 0, 0, 0.8)',
                titleColor: '#00d4ff',
                titleFont: { family: 'Orbitron', size: 12 },
                bodyColor: '#fff',
                bodyFont: { family: 'Noto Sans JP', size: 13 },
                borderColor: 'rgba(0, 212, 255, 0.5)',
                borderWidth: 1,
                cornerRadius: 10,
                padding: 12,
                yAlign: 'bottom',
                xAlign: 'center',
                callbacks: {
                    label: function(context) {
                        const label = context.dataset.label || '';
                        const value = context.parsed.y;
                        if (label === '温度') {
                            return `${label}: ${value}℃`;
                        } else {
                            return `${label}: ${value}%`;
                        }
                    }
                }
            },
            zoom: {
                pan: {
                    enabled: true,
                    mode: 'x'
                },
                zoom: {
                    wheel: { enabled: true },
                    drag: { enabled: true },
                    mode: 'x'
                }
            },
            crosshair: {
                line: {
                    color: '#888',
                    width: 1
                },
                sync: {
                    enabled: false
                },
                zoom: {
                    enabled: false
                },
                snap: {
                    enabled: false
                }
            },
            annotation: {
                annotations: (() => {
                    // 72時間分の0時0分の縦線を生成
                    const lines = {};
                    const now = new Date();
                    for (let i = 0; i <= 3; i++) {
                        const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - i, 0, 0, 0, 0);
                        lines['dayline' + i] = {
                            type: 'line',
                            xMin: d.getTime(),
                            xMax: d.getTime(),
                            borderColor: 'rgba(0, 212, 255, 0.4)',
                            borderWidth: 2,
                            borderDash: [6, 6],
                            label: {
                                display: false
                            }
                        };
                    }
                    return lines;
                })()
            }
        },

        elements: {
            line: {
                borderWidth: 2,
                tension: 0.4
            },
            point: {
                radius: 0,
                hoverRadius: 6
            }
        }
    };

    if (!tempChart) {

        tempChart = new Chart(document.getElementById("tempChart"), {
            type: "line",
            data: {
                datasets: [
                    {
                        label: "温度",
                        data: tempData,
                        borderColor: "#ff6b6b",
                        yAxisID: 'yTemp',
                        backgroundColor: "rgba(255, 107, 107, 0.15)",
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 0,
                        pointHoverRadius: 6,
                        pointHoverBackgroundColor: "#ff6b6b",
                        pointHoverBorderColor: "#fff",
                        pointHoverBorderWidth: 2
                    },
                    {
                        label: "湿度",
                        data: humData,
                        borderColor: "#6b9fff",
                        yAxisID: 'yHum',
                        backgroundColor: "rgba(107, 159, 255, 0.15)",
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 0,
                        pointHoverRadius: 6,
                        pointHoverBackgroundColor: "#6b9fff",
                        pointHoverBorderColor: "#fff",
                        pointHoverBorderWidth: 2
                    }
                ]
            },
            options: {
                ...options,
                scales: {
                    x: options.scales.x,
                    yHum: {
                        position: 'left',
                        min: 40,
                        max: 100,
                        ticks: { 
                            stepSize: 10,
                            color: 'rgba(255,255,255,0.7)',
                            font: { family: 'Orbitron' }
                        },
                        title: { display: true, text: '湿度 (%)', color: '#6b9fff', font: { family: 'Orbitron', size: 12 } },
                        grid: { color: 'rgba(255,255,255,0.1)' },
                        border: { color: 'rgba(255,255,255,0.2)' }
                    },
                    yTemp: {
                        position: 'right',
                        min: 10,
                        max: 30,
                        ticks: { 
                            stepSize: 10,
                            color: 'rgba(255,255,255,0.7)',
                            font: { family: 'Orbitron' }
                        },
                        title: { display: true, text: '温度 (℃)', color: '#ff6b6b', font: { family: 'Orbitron', size: 12 } },
                        grid: { color: 'rgba(255,255,255,0.1)' },
                        border: { color: 'rgba(255,255,255,0.2)' }
                    }
                }
            }
        });

    } else {
        tempChart.data.datasets[0].data = tempData;
        tempChart.data.datasets[1].data = humData;

        // ★ズーム保持（ここ重要）
        const tempState = tempChart.getZoomedState?.();

        tempChart.update();
    }
}

// リセット
function resetZoom() {
    tempChart.resetZoom();
}

// CSVダウンロード
function downloadCSV() {

    const start = new Date(document.getElementById("start").value);
    const end = new Date(document.getElementById("end").value);

    const filtered = lastData.filter(d => {
        const t = new Date(d.recorded_at);
        return t >= start && t <= end;
    });

    let csv = "datetime,temperature,humidity\n";

    filtered.forEach(d => {
        csv += `${d.recorded_at},${d.temperature},${d.humidity}\n`;
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = `greenhouse_${start.toISOString()}_to_${end.toISOString()}.csv`;
    a.click();
}

loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
